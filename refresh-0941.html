<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#11100f"><title>Atlas 更新中</title><style>html,body{margin:0;width:100%;height:100%;background:#0d0c0b;color:#f3eee7;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}body{display:grid;place-items:center}.card{text-align:center;padding:28px}.spinner{width:34px;height:34px;margin:0 auto 16px;border:3px solid rgba(255,255,255,.14);border-top-color:#bd3342;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}p{color:#a9a098;font-size:14px}</style></head><body><div class="card"><div class="spinner"></div><b>正在更新 Atlas 0.9.4.1</b><p>清理旧缓存并重新载入。</p></div><script>(async()=>{try{if('serviceWorker'in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()))}if('caches'in window){const keys=await caches.keys();await Promise.all(keys.filter(k=>k.startsWith('atlas-')).map(k=>caches.delete(k)))}}catch(e){console.warn(e)}const target='./?v=0941&hard-refresh='+Date.now();location.replace(target)})();</script></body></html>
