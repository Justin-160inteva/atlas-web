<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0c" />
  <title>Atlas · 扫描与导入进度</title>
  <link rel="stylesheet" href="scan-monitor.css?v=0.1.0" />
</head>
<body>
  <main class="monitor-shell">
    <header class="monitor-head">
      <div><small>ATLAS DEVELOPER MONITOR</small><h1>扫描与导入进度</h1></div>
      <div class="sync-meta"><b id="syncState">连接中</b><small id="lastSync">—</small></div>
    </header>

    <section class="hero">
      <div class="hero-top"><span class="status-badge" id="statusBadge" data-state="idle"><i></i><b>读取状态</b></span><strong class="hero-percent" id="heroPercent">0%</strong></div>
      <h2 id="activeTitle">正在连接扫描队列</h2>
      <p id="activeDetail">读取 GitHub Actions、扫描状态、自动恢复和看门狗数据。</p>
      <div class="progress-track"><i id="heroBar"></i></div>
      <div class="stats">
        <div class="stat"><b id="pilotProgress">0 / 3</b><small>山城试验导入</small></div>
        <div class="stat"><b id="catalogProgress">0 / 80</b><small>作者目录导入</small></div>
        <div class="stat"><b id="attemptCount">0 / 3</b><small>当前尝试次数</small></div>
        <div class="stat"><b id="heartbeatAge">—</b><small>最后状态更新</small></div>
      </div>
    </section>

    <div class="grid">
      <section class="card">
        <div class="card-title"><b>山城试验队列</b><small id="queueSummary">3 个任务</small></div>
        <div class="queue" id="queueList"><div class="empty">正在载入队列…</div></div>
      </section>
      <section class="card">
        <div class="card-title"><b>当前处理阶段</b><small>真实事件状态</small></div>
        <div class="stage-list" id="stageList"></div>
        <div class="warning" id="freshnessNotice">页面每15秒读取状态；GitHub Actions 运行状态每60秒同步一次。</div>
      </section>
      <section class="card">
        <div class="card-title"><b>自动恢复</b><small id="recoveryCategory">未触发</small></div>
        <div id="recoveryPanel"><div class="empty">当前没有恢复事件。</div></div>
      </section>
      <section class="card">
        <div class="card-title"><b>最近事件</b><small>脱敏摘要</small></div>
        <div id="eventList"><div class="empty">等待扫描事件。</div></div>
      </section>
    </div>

    <p class="footer">只显示公开、脱敏的任务状态。不会展示授权截图、Cookie、原始媒体地址、视频文件或关键帧像素。</p>
  </main>
  <script src="scan-monitor.js?v=0.1.0" defer></script>
</body>
</html>
