<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no,interactive-widget=resizes-content" />
  <meta name="theme-color" content="#11100f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Atlas" />
  <link rel="apple-touch-icon" href="icon-180.png?v=0.9.4.8" />
  <title>Atlas · 刺客信条：影</title>
  <link rel="manifest" href="manifest.webmanifest?v=0.9.4.8" />
  <script src="atlas-bootstrap.js?v=0.9.4.8&build=ipad-frame-unlocked-1"></script>
  <link rel="stylesheet" href="styles.css?v=0.9.4.8" />
  <link rel="stylesheet" href="alpha03.css?v=0.9.4.8" />
  <link rel="stylesheet" href="route.css?v=0.9.4.8" />
  <link rel="stylesheet" href="smart-route.css?v=0.9.4.8" />
  <link rel="stylesheet" href="performance-071.css?v=0.9.4.8" />
  <link rel="stylesheet" href="performance-074.css?v=0.9.4.8" />
  <link rel="stylesheet" href="atlas-080.css?v=0.9.4.8" />
  <link rel="stylesheet" href="evidence-studio.css?v=0.9.4.8" />
  <link rel="stylesheet" href="multiview-091.css?v=0.9.4.8" />
  <link rel="stylesheet" href="public-library.css?v=0.9.4.8" />
  <link rel="stylesheet" href="atlas-settings.css?v=0.9.4.8" />
  <link rel="stylesheet" href="atlas-ipad-canvas-hotfix-0948.css?v=0.9.4.8&build=ipad-frame-unlocked-1" />
</head>
<body>
  <main class="app-shell" aria-label="Atlas 互动地图">
    <canvas id="mapCanvas" aria-label="刺客信条影互动地图"></canvas>
    <div class="vignette" aria-hidden="true"></div>
    <header class="top-bar glass">
      <button class="brand" id="brandBtn" aria-label="重置地图视图"><span class="brand-mark">A</span><span class="brand-copy"><b>ATLAS</b><small>ASSASSIN'S CREED SHADOWS · ALPHA 0.9.4.8</small></span></button>
      <button class="search-trigger" id="searchTrigger" aria-label="搜索地点"><span class="icon">⌕</span><span id="searchLabel">搜索地点、区域或类别</span><kbd>⌘ K</kbd></button>
      <div class="top-actions"><button class="icon-button" id="locateBtn" aria-label="回到地图中心">⌖</button><button class="profile-button" id="evidenceStudioBtn" aria-label="打开数据与证据中心">⚙</button></div>
    </header>
    <aside class="quick-rail glass" aria-label="快捷筛选">
      <button class="rail-button active" data-mode="all"><span class="rail-icon" aria-hidden="true"></span><small>全部</small></button><button class="rail-button" data-mode="locations"><span class="rail-icon" aria-hidden="true"></span><small>地点</small></button><button class="rail-button" data-mode="collectibles"><span class="rail-icon" aria-hidden="true"></span><small>收集</small></button><button class="rail-button" data-mode="activities"><span class="rail-icon" aria-hidden="true"></span><small>活动</small></button><button class="rail-button" data-mode="favorites"><span class="rail-icon" aria-hidden="true"></span><small>收藏</small></button>
    </aside>
    <div class="map-controls glass" aria-label="地图控制"><button id="zoomIn" aria-label="放大">＋</button><button id="zoomOut" aria-label="缩小">－</button><button id="resetView" aria-label="重置视图">↺</button></div>
    <section class="status-pill glass" aria-live="polite"><span class="pulse"></span><b id="visibleCount">0</b><span>个发现</span><i></i><span id="zoomLabel">×1.00</span></section>
    <nav class="bottom-nav glass" aria-label="主导航"><button class="nav-item active" data-panel="map"><span></span><small>地图</small></button><button class="nav-item" data-panel="filter"><span></span><small>筛选</small></button><button class="nav-item" data-panel="route"><span></span><small>路线</small></button><button class="nav-item" data-panel="progress"><span></span><small>进度</small></button><button class="nav-item" data-panel="favorites"><span></span><small>收藏</small></button></nav>
    <section class="sheet" id="detailSheet" aria-hidden="true"><button class="sheet-handle" id="sheetHandle" aria-label="切换详情高度"></button><div class="sheet-levels" aria-label="详情卡高度"><button data-level="peek" class="active"></button><button data-level="mid"></button><button data-level="full"></button></div><div class="sheet-body" id="detailContent"></div></section>
    <section class="panel glass" id="filterPanel" aria-hidden="true"><header><div><small>探索筛选</small><h2>选择要显示的发现</h2></div><button class="close-panel">×</button></header><div class="filter-summary"><span id="filterCount">44</span><small>个分类</small><button id="toggleAll">全部隐藏</button></div><div class="category-grid" id="categoryGrid"></div></section>
    <section class="panel glass route-panel" id="routePanel" aria-hidden="true"><header><div><small>ATLAS EXPLORATION PLANNER</small><h2>探索路线规划</h2></div><button class="close-route">×</button></header><div class="route-summary"><div class="route-stat"><b id="routeStops">0</b><small>路线点</small></div><div class="route-stat"><b id="routeDistance">0</b><small>地图距离</small></div><div class="route-stat"><b id="routeTime">0 分钟</b><small>预计时间</small></div></div><div class="route-actions"><button class="primary" id="optimizeRoute">优化顺序</button><button id="focusRoute">查看全程</button><button id="clearRoute">清除</button></div><div class="route-list" id="routeList"></div></section>
    <section class="panel glass progress-panel" id="progressPanel" aria-hidden="true"><header><div><small>探索进度</small><h2>区域完成情况</h2></div><button class="close-progress">×</button></header><div class="overall-progress"><div><b id="overallPercent">0%</b><small>总体完成度</small></div><div class="progress-track"><i id="overallBar"></i></div><p>已发现 <span id="overallDone">0</span> / <span id="overallTotal">0</span></p></div><div class="region-progress-list" id="regionProgressList"></div></section>
    <section class="search-overlay" id="searchOverlay" aria-hidden="true"><div class="search-modal glass"><div class="search-input-row"><span>⌕</span><input id="searchInput" autocomplete="off" placeholder="搜索中文或英文名称"/><button id="closeSearch">取消</button></div><div class="search-meta"><span>结果</span><b id="resultCount">0</b></div><div class="search-results" id="searchResults"></div></div></section>
    <section class="evidence-panel glass" id="evidencePanel" aria-hidden="true">
      <header><div><small>ATLAS EVIDENCE RECONSTRUCTION</small><h2>证据重建实验室</h2></div><button id="closeEvidenceStudio" aria-label="关闭证据重建工作区">×</button></header>
      <div class="evidence-scroll">
        <div class="evidence-stats"><div class="evidence-stat"><b id="evidenceSources">0</b><small>本地视频</small></div><div class="evidence-stat"><b id="evidenceFrames">0</b><small>关键帧</small></div><div class="evidence-stat"><b id="evidenceBuildings">0</b><small>建筑</small></div><div class="evidence-stat"><b id="evidenceCoverage">0%</b><small>覆盖率</small></div></div>
        <section class="evidence-section"><div class="evidence-section-title"><b>本地项目</b><small>视频与关键帧不会上传</small></div><div class="evidence-actions"><button class="primary" id="addEvidenceVideos">添加视频</button><button id="importEvidenceProject">导入项目</button><button id="exportEvidenceProject">导出项目</button><button class="danger" id="clearEvidenceProject">清空本机项目</button></div><input id="evidenceVideoInput" type="file" accept="video/*" multiple hidden /><input id="evidenceImportInput" type="file" accept="application/json,.json" hidden /></section>
        <section class="evidence-section"><div class="evidence-section-title"><b>季节数据层</b><small>基础几何独立保存</small></div><div class="evidence-season-tabs"><button data-evidence-season="spring">春</button><button data-evidence-season="summer">夏</button><button data-evidence-season="autumn">秋</button><button data-evidence-season="winter">冬</button></div><div class="evidence-switches"><label><input id="toggleEvidenceCoverage" type="checkbox">覆盖热力图</label><label><input id="toggleEvidenceBuildings" type="checkbox">建筑矢量层</label><label><input id="toggleEvidenceAnchors" type="checkbox">证据锚点</label></div></section>
        <section class="evidence-section"><div class="evidence-section-title"><b>地图编辑工具</b><small>点击工具后在地图上落点</small></div><div class="evidence-tool-grid"><button data-evidence-tool="anchor">定位证据帧</button><button data-evidence-tool="coverage">标注覆盖</button><button data-evidence-tool="building">放置建筑</button></div><div class="evidence-template-row"><select id="evidenceTemplateSelect" aria-label="建筑模板"></select></div><div class="evidence-tool-label" id="evidenceToolLabel">浏览地图</div></section>
        <section class="evidence-section"><div class="evidence-section-title"><b>视频来源</b><small>当前设备会话</small></div><div id="evidenceSourcesList"></div></section>
        <section class="evidence-section"><div class="evidence-section-title"><b>关键帧证据</b><small>点击一帧后在地图定位</small></div><div class="evidence-frames" id="evidenceFrames"></div></section>
        <section class="evidence-section"><div class="evidence-section-title"><b>建筑审核</b><small>原创模板＋证据链</small></div><div id="evidenceBuildingsList"></div><div class="evidence-building-editor" id="evidenceBuildingEditor" hidden></div></section>
      </div>
      <div class="evidence-status" id="evidenceStatus" role="status"></div>
    </section>
    <div class="route-badge" id="routeBadge"><span id="routeBadgeText">路线未建立</span><button id="openRouteBadge">查看</button></div>
    <div class="toast" id="toast" role="status"></div>
  </main>
  <script src="atlas-icons.js?v=0.9.4.8"></script>
  <script src="atlas-i18n.js?v=0.9.4.8"></script>
  <script src="location-names.js?v=0.9.4.8"></script>
  <script src="location-title-polish.js?v=0.9.4.8"></script>
  <script src="atlas-data-guard-0939.js?v=0.9.4.8"></script>
  <script src="route-engine.js?v=0.9.4.8"></script>
  <script src="atlas-ipad-gesture-hotfix-0948.js?v=0.9.4.8&build=ipad-frame-unlocked-1" defer></script>
  <script src="app.js?v=0.9.4.8" defer></script>
  <script src="location-search-patch.js?v=0.9.4.8" defer></script>
  <script src="marker-state.js?v=0.9.4.8" defer></script>
  <script src="smart-route.js?v=0.9.4.8" defer></script>
  <script src="performance-071.js?v=0.9.4.8&build=ipad-frame-unlocked-1" defer></script>
  <script src="performance-074.js?v=0.9.4.8" defer></script>
  <script src="atlas-080.js?v=0.9.4.8" defer></script>
  <script src="page-zoom-guard.js?v=0.9.4.8" defer></script>
  <script src="atlas-hd-init.js?v=0.9.4.8" defer></script>
  <script src="atlas-hd-map.js?v=0.9.4.8" defer></script>
  <script src="atlas-hd-runtime.js?v=0.9.4.8" defer></script>
  <script src="atlas-settings.js?v=0.9.4.8" defer></script>
  <script src="atlas-evidence-studio.js?v=0.9.4.8" defer></script>
  <script src="atlas-evidence-workflow.js?v=0.9.4.8" defer></script>
  <script src="atlas-multiview-091.js?v=0.9.4.8" defer></script>
  <script src="atlas-public-library.js?v=0.9.4.8" defer></script>
  <script src="atlas-analysis-import.js?v=0.9.4.8" defer></script>
  <script src="atlas-ipad-canvas-hotfix-0948.js?v=0.9.4.8&build=ipad-frame-unlocked-1" defer></script>
</body>
</html>
