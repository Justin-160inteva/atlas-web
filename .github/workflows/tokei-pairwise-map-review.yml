name: Tokei Pairwise Map Review

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/tokei-pairwise-map-review.yml'
      - 'tools/review_tokei_pairwise_map_evidence.py'
      - 'data/geospatial/tokei-pairwise-review-trigger.json'

permissions:
  contents: write
  models: read

concurrency:
  group: tokei-pairwise-map-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile targeted reviewer
        run: |
          python -m py_compile \
            tools/review_tokei_pairwise_map_evidence.py \
            tools/analyze_authorized_video_v2.py \
            tools/analyze_authorized_video_v4.py

      - name: Install transient dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'yt-dlp[default,curl-cffi]' opencv-python-headless numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download authorized shrine video transiently
        id: download
        run: |
          rm -rf /tmp/tokei-review-video /tmp/tokei-review-evidence /tmp/tokei-review-publish
          mkdir -p /tmp/tokei-review-video /tmp/tokei-review-evidence /tmp/tokei-review-publish/data/geospatial
          PYTHONPATH=tools python - <<'PY'
          import json
          import os
          from pathlib import Path
          import analyze_authorized_video_v4 as resilient

          workdir = Path('/tmp/tokei-review-video')
          video_path, attempts = resilient.runner.download_with_fallbacks(
              'https://www.bilibili.com/video/BV1aFXaYmEDZ/', workdir
          )
          if not video_path.is_file() or video_path.stat().st_size < 1024:
              raise RuntimeError('download did not produce a usable shrine video')
          strategy = next(row['strategy'] for row in attempts if row.get('success'))
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'video_path={video_path.resolve()}\n')
              handle.write(f'download_strategy={strategy}\n')
          print(json.dumps({'video': str(video_path), 'strategy': strategy}, ensure_ascii=False))
          PY

      - name: Review Tokei pairwise geometry with two models
        env:
          GITHUB_TOKEN: ${{ github.token }}
          VIDEO_PATH: ${{ steps.download.outputs.video_path }}
        run: |
          python tools/review_tokei_pairwise_map_evidence.py \
            --video "$VIDEO_PATH" \
            --work-dir /tmp/tokei-review-evidence \
            --output data/geospatial/tokei-pairwise-map-review.json

      - name: Read review state
        id: state
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          result = json.loads(Path('data/geospatial/tokei-pairwise-map-review.json').read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'status={result["status"]}\n')
              handle.write(f'successful_models={result["counts"]["successfulModels"]}\n')
              handle.write(f'failed_models={result["counts"]["failedModels"]}\n')
          print(json.dumps({
              'status': result['status'],
              'counts': result['counts'],
              'packets': [
                  {
                      'model': row['model'],
                      'verdict': row['verdict'],
                      'selectedLocationId': row['selectedLocationId'],
                      'confidence': row['confidence'],
                  }
                  for row in result['reviewPackets']
              ],
              'errors': result['errors'],
          }, ensure_ascii=False))
          PY

      - name: Validate review isolation and privacy gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path('data/geospatial/tokei-pairwise-map-review.json').read_text(encoding='utf-8'))
          composite = Path('/tmp/tokei-review-evidence') / result['composite']['filename']
          assert result['target']['locationId'] == 'location-mapgenie-438414'
          assert result['target']['directNeighborLocationId'] == 'location-mapgenie-437477'
          assert result['status'] in {'confirmed', 'complete-unresolved', 'partial-review'}
          assert result['counts']['successfulModels'] + result['counts']['failedModels'] == 2
          assert result['policy']['coordinatesAssigned'] is False
          assert result['policy']['canonicalAnchorModified'] is False
          assert result['privacy']['repositoryContainsPixels'] is False
          assert composite.is_file()
          if result['status'] == 'confirmed':
              assert len(result['reviewPackets']) == 2
              assert all(row['verdict'] == 'confirmed' for row in result['reviewPackets'])
              assert all(row['selectedLocationId'] == 'location-mapgenie-438414' for row in result['reviewPackets'])
              assert all(row['confidence'] >= .92 for row in result['reviewPackets'])
          assert not list(Path('data').rglob('*.jpg'))
          assert not list(Path('data').rglob('*.png'))
          assert not list(Path('data').rglob('*.mp4'))
          PY

      - name: Upload one-day targeted review composite
        uses: actions/upload-artifact@v4
        with:
          name: tokei-pairwise-map-review-${{ github.run_id }}
          path: /tmp/tokei-review-evidence
          retention-days: 1
          compression-level: 6
          if-no-files-found: error

      - name: Stage non-pixel review result
        run: |
          cp data/geospatial/tokei-pairwise-map-review.json \
            /tmp/tokei-review-publish/data/geospatial/

      - name: Atomically publish non-pixel review result
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4 5 6; do
            git fetch origin "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"
            mkdir -p data/geospatial
            cp /tmp/tokei-review-publish/data/geospatial/tokei-pairwise-map-review.json \
              data/geospatial/
            git add data/geospatial/tokei-pairwise-map-review.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Review Tokei pairwise map geometry [skip ci]'
            if git push origin "HEAD:$TARGET_BRANCH"; then exit 0; fi
            sleep $((attempt * 5))
          done
          exit 1

      - name: Delete transient video and review pixels
        if: always()
        run: |
          rm -rf /tmp/tokei-review-video /tmp/tokei-review-evidence /tmp/tokei-review-publish
          test ! -e /tmp/tokei-review-video
          test ! -e /tmp/tokei-review-evidence
          test ! -e /tmp/tokei-review-publish
