name: Validate scan system health

on:
  push:
    paths:
      - 'index.html'
      - 'atlas-settings.css'
      - 'atlas-settings.js'
      - 'data/scan-bug-dictionary.json'
      - 'data/batch-analysis/eleven-pilot-scan-manifest.json'
      - 'data/batch-analysis/eleven-production-order-policy.json'
      - 'tools/publish_runtime_progress.py'
      - 'tools/publish_runtime_progress_v2.py'
      - 'tools/analyze_authorized_video_v11.py'
      - 'tools/analyze_authorized_video_v12.py'
      - 'tools/diagnose_and_recover_scan_v2.py'
      - 'tools/run_scan_with_auto_recovery.py'
      - 'tools/run_scan_with_auto_recovery_v2.py'
      - 'tools/audit_scan_system_v3.py'
      - 'scan-monitor.html'
      - 'scan-monitor.js'
      - 'scan-monitor-live-bridge.js'
      - 'sw.js'
      - '.github/workflows/scan-eleven-pilot-v2.yml'
      - '.github/workflows/validate-scan-monitor.yml'
      - '.github/workflows/validate-scan-system.yml'
  pull_request:
    paths:
      - 'data/scan-bug-dictionary.json'
      - 'data/batch-analysis/eleven-pilot-scan-manifest.json'
      - 'tools/publish_runtime_progress.py'
      - 'tools/publish_runtime_progress_v2.py'
      - 'tools/analyze_authorized_video_v11.py'
      - 'tools/analyze_authorized_video_v12.py'
      - 'tools/diagnose_and_recover_scan_v2.py'
      - 'tools/run_scan_with_auto_recovery.py'
      - 'tools/run_scan_with_auto_recovery_v2.py'
      - 'tools/audit_scan_system_v3.py'
      - 'scan-monitor.html'
      - 'scan-monitor.js'
      - 'scan-monitor-live-bridge.js'
      - 'sw.js'
      - '.github/workflows/scan-eleven-pilot-v2.yml'
      - '.github/workflows/validate-scan-monitor.yml'
      - '.github/workflows/validate-scan-system.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validate-scan-system-health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python pipeline
        run: |
          python -m py_compile tools/publish_runtime_progress.py
          python -m py_compile tools/publish_runtime_progress_v2.py
          python -m py_compile tools/analyze_authorized_video_v11.py
          python -m py_compile tools/analyze_authorized_video_v12.py
          python -m py_compile tools/diagnose_and_recover_scan_v2.py
          python -m py_compile tools/run_scan_with_auto_recovery.py
          python -m py_compile tools/run_scan_with_auto_recovery_v2.py
          python -m py_compile tools/audit_scan_system_v3.py

      - name: Validate JavaScript monitor
        run: |
          node --check atlas-settings.js
          node --check scan-monitor.js
          node --check scan-monitor-live-bridge.js
          node --check sw.js

      - name: Run executable systemic audit and simulated recovery cases
        id: systemic_audit
        continue-on-error: true
        run: python tools/audit_scan_system_v3.py

      - name: Upload health report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scan-system-health-${{ github.sha }}
          path: data/batch-analysis/scan-system-health.json
          if-no-files-found: error

      - name: Remove timestamp-only report changes
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python - <<'PY'
          import json, pathlib, subprocess
          path='data/batch-analysis/scan-system-health.json'
          current=json.loads(pathlib.Path(path).read_text(encoding='utf-8'))
          try:
              previous=json.loads(subprocess.check_output(['git','show',f'HEAD:{path}'],text=True))
          except Exception:
              previous={}
          current.pop('generatedAt',None)
          previous.pop('generatedAt',None)
          if current==previous:
              subprocess.run(['git','checkout','--',path],check=True)
              print('semantic report unchanged; timestamp-only update removed')
          else:
              print('semantic report changed; persistence allowed')
          PY

      - name: Persist semantic health report changes
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          REPORT='data/batch-analysis/scan-system-health.json'
          if [ -z "$(git status --porcelain -- "$REPORT")" ]; then
            echo 'Health report semantics unchanged.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$REPORT"
          git commit -m 'Update scan system health report [skip ci]'
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then exit 0; fi
            git rebase --abort || true
            sleep $((attempt * 3))
          done
          exit 1

      - name: Enforce complete health gate
        if: always()
        run: |
          python - <<'PY'
          import json
          report=json.load(open('data/batch-analysis/scan-system-health.json',encoding='utf-8'))
          required={
              'monitor_poll','monitor_thresholds','monitor_projection','monitor_recovery_retention',
              'publisher_409_simulation','same_job_recovery','live_recovery',
              'repository_media_clean','action_412','action_range_fallback',
              'action_media','action_timeout','v12_adapter','adaptive_ranges',
              'no_rate_limit','balanced_sampling','telemetry_preservation','bounded_queue',
              'validation_current_ref','validation_report_dedup'
          }
          checks={item['name']:item for item in report['checks']}
          assert report['summary']['total']>=35, report['summary']
          assert required <= checks.keys(), sorted(required-checks.keys())
          assert report['status']=='pass', [item for item in report['checks'] if not item['passed']]
          assert report['summary']['failed']==0, report['summary']
          assert all(checks[name]['passed'] for name in required), checks
          print(f"scan system health: {report['summary']['passed']}/{report['summary']['total']} passed")
          PY
