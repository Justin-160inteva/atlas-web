name: Validate embedded scan monitor

on:
  push:
    paths:
      - 'index.html'
      - 'atlas-settings.css'
      - 'atlas-settings.js'
      - 'scan-monitor.html'
      - 'scan-monitor.css'
      - 'scan-monitor.js'
      - 'sw.js'
      - 'tools/publish_runtime_progress.py'
      - 'tools/analyze_authorized_video.py'
      - 'data/runtime-progress/eleven-pilot-progress.json'
      - '.github/workflows/validate-scan-monitor.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        run: |
          node --check atlas-settings.js
          node --check scan-monitor.js
          node --check sw.js

      - name: Validate Python heartbeat pipeline
        run: |
          python -m py_compile tools/publish_runtime_progress.py
          python -m py_compile tools/analyze_authorized_video.py

      - name: Validate monitor contracts and privacy boundaries
        run: |
          python - <<'PY'
          import json, pathlib
          index=pathlib.Path('index.html').read_text(encoding='utf-8')
          settings=pathlib.Path('atlas-settings.js').read_text(encoding='utf-8')
          monitor_html=pathlib.Path('scan-monitor.html').read_text(encoding='utf-8')
          monitor_js=pathlib.Path('scan-monitor.js').read_text(encoding='utf-8')
          worker=pathlib.Path('sw.js').read_text(encoding='utf-8')
          progress=json.loads(pathlib.Path('data/runtime-progress/eleven-pilot-progress.json').read_text(encoding='utf-8'))
          assert 'atlas-settings.css?v=0.2.0' in index and 'atlas-settings.js?v=0.2.0' in index
          assert index.index('atlas-settings.js') < index.index('atlas-evidence-studio.js')
          assert 'openScanMonitor' in settings and 'openEvidenceLab' in settings
          assert 'scan-monitor.html?embedded=1&v=0.2.0' in settings
          assert 'raw.githubusercontent.com' in settings
          assert 'statusBadge' in monitor_html and 'queueList' in monitor_html and 'recoveryPanel' in monitor_html
          assert '任务数据更新时间' in monitor_html and 'forceRefresh' in monitor_html
          assert 'FAST_POLL_MS=10000' in monitor_js
          assert 'RAW_BASE' in monitor_js and 'GitHub main' in monitor_js
          assert '页面同步' in monitor_js and '任务端' in monitor_js
          assert './scan-monitor.html' in worker and './scan-monitor.js' in worker and './scan-monitor.css' in worker
          assert 'monitor-v2' in worker
          assert progress['externalSourceId'].endswith(('-p020','-p021','-p022'))
          assert progress['privacy']
          serialized=json.dumps(progress,ensure_ascii=False).lower()
          for forbidden in ('cookie=', 'set-cookie', '.mp4', '.flv', 'cdnurl', 'authorization: bearer'):
              assert forbidden not in serialized
          media=[]
          for pattern in ('*.mp4','*.m4a','*.webm','*.flv'):
              media.extend(pathlib.Path('.').rglob(pattern))
          assert not media, media
          print('embedded scan monitor v0.2.0 validation passed')
          PY