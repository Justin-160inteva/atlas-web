name: Verify completed Dada sequence 06

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-completed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify sequence 06 remains complete
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          result = json.loads(Path('data/analysis-results/dada-06.json').read_text(encoding='utf-8'))
          queue = json.loads(Path('data/analysis-jobs/dada-quality-reprocess.json').read_text(encoding='utf-8'))
          catalog = json.loads(Path('data/dada-ac-shadows-catalog.json').read_text(encoding='utf-8'))
          item = next(x for x in catalog['items'] if x['sequence'] == 6)
          assert result['status'] == 'analyzed'
          assert result['source']['url'].endswith('/BV13ioXYEE8d/')
          assert item['analysisQualityStatus'] == 'verified-correct-source'
          assert 6 not in queue['sequences']
          PY
