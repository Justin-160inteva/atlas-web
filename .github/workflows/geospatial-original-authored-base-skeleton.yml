name: Geospatial Original Authored Base Skeleton

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile original-base builders
        run: |
          python -m py_compile \
            tools/build_geospatial_original_authored_base_skeleton.py \
            tools/run_geospatial_original_authored_base_skeleton_with_diagnostic.py

      - name: Rebuild skeleton in the temporary workspace
        run: python tools/run_geospatial_original_authored_base_skeleton_with_diagnostic.py

      - name: Validate deterministic skeleton without publishing progress
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          skeleton = json.loads(Path('data/geospatial/geospatial-original-authored-base-skeleton.json').read_text(encoding='utf-8'))
          assert skeleton['status'] == 'original-authored-spatial-skeleton-ready'
          assert skeleton['counts'] == {
              'locations': 3430,
              'regionAssignedLocations': 3425,
              'unassignedLocations': 5,
              'regions': 10,
              'confirmedAnchorCoveredRegions': 9,
              'confirmedAnchors': 50,
              'regionAdjacencyEdges': 20,
              'densityGridSize': 32,
          }
          assert skeleton['unanchoredRegionIds'] == ['region-3304-awaji']
          assert len(skeleton['unassignedLocationGuides']) == 5
          assert all(value is False for value in skeleton['safety'].values())
          assert not list(Path('data/geospatial').glob('*.png'))
          assert not list(Path('data/geospatial').glob('*.jpg'))
          assert not list(Path('data/geospatial').glob('*.webp'))
          print(json.dumps({
              'status': skeleton['status'],
              'counts': skeleton['counts'],
              'published': False,
          }, ensure_ascii=False))
          PY
