name: Dada catalog quality audit

on:
  push:
    branches: [main]
    paths:
      - 'data/batch-analysis/dada-author-catalog-status.json'
      - 'data/dada-ac-shadows-catalog.json'
      - 'data/analysis-results/**'
      - 'tools/audit_dada_catalog.py'
      - '.github/workflows/dada-catalog-quality-audit.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

concurrency:
  group: dada-catalog-quality
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate quality report and reprocess queue
        run: python tools/audit_dada_catalog.py

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: dada-catalog-quality-${{ github.sha }}
          path: |
            data/batch-analysis/dada-catalog-quality-audit.json
            data/analysis-jobs/dada-quality-reprocess.json

      - name: Persist audit report and queue
        if: github.event_name != 'pull_request'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/batch-analysis/dada-catalog-quality-audit.json data/analysis-jobs/dada-quality-reprocess.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Update Dada catalog quality audit [skip ci]'
          git push

      - name: Enforce creator catalog quality
        run: python tools/audit_dada_catalog.py --fail-on-critical
