name: Dada catalog quality audit

on:
  push:
    branches: [main]
    paths:
      - 'data/batch-analysis/dada-author-catalog-status.json'
      - 'data/dada-ac-shadows-catalog.json'
      - 'data/analysis-results/**'
      - 'tools/audit_dada_catalog.py'
      - '.github/workflows/dada-catalog-quality-audit.yml'
  pull_request:
    paths:
      - 'data/batch-analysis/dada-author-catalog-status.json'
      - 'data/dada-ac-shadows-catalog.json'
      - 'data/analysis-results/**'
      - 'tools/audit_dada_catalog.py'
      - '.github/workflows/dada-catalog-quality-audit.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

permissions:
  contents: write

concurrency:
  group: dada-catalog-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile audit tool
        run: python -m py_compile tools/audit_dada_catalog.py

      - name: Generate quality report and safe resolution queue
        run: python tools/audit_dada_catalog.py

      - name: Verify audit safety invariants
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('data/batch-analysis/dada-catalog-quality-audit.json').read_text(encoding='utf-8'))
          queue = json.loads(Path('data/analysis-jobs/dada-quality-reprocess.json').read_text(encoding='utf-8'))

          assert report['schemaVersion'] == 2
          assert queue['schemaVersion'] == 2
          retained = set(queue['canonicalRetainedSequences'])
          queued = set(queue['sequences'])
          assert retained.isdisjoint(queued), (retained, queued)
          assert queue['automaticDownloadEnabled'] is False
          assert len(queue['items']) == len(queued)
          assert all(item['safeToDownloadNow'] is False for item in queue['items'])
          assert all(item['requiresExactUrlVerification'] is True for item in queue['items'])
          assert all(item['action'] in {
              'resolve_exact_url_then_reprocess',
              'verify_catalog_identity_then_resolve_url',
          } for item in queue['items'])
          assert report['summary']['queueSequences'] == queue['sequences']
          print(json.dumps(report['summary'], ensure_ascii=False))
          PY

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: dada-catalog-quality-${{ github.sha }}
          path: |
            data/batch-analysis/dada-catalog-quality-audit.json
            data/analysis-jobs/dada-quality-reprocess.json

      - name: Persist audit report and queue
        if: github.event_name != 'pull_request'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/batch-analysis/dada-catalog-quality-audit.json data/analysis-jobs/dada-quality-reprocess.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Update Dada catalog quality audit [skip ci]'
          git push

      - name: Report unresolved catalog quality
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('data/batch-analysis/dada-catalog-quality-audit.json').read_text(encoding='utf-8'))
          if report['qualityComplete']:
              print('Dada catalog quality is complete.')
          else:
              print('Dada catalog remains unresolved; safe queue generated without downloading media.')
          PY
