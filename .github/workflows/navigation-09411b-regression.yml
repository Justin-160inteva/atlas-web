name: UI 0.9.4.12b-1 marker regression

on:
  pull_request:
    paths:
      - 'index.html'
      - 'atlas-navigation-09411a.css'
      - 'atlas-navigation-09411b.js'
      - 'marker-state.js'
      - 'release-manifest.json'
      - 'atlas-bootstrap.js'
      - 'sw.js'
      - 'tools/navigation_observer_contract_09411b.mjs'
      - 'tools/navigation_browser_smoke_09411c.mjs'
      - '.github/workflows/navigation-09411b-regression.yml'
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'atlas-navigation-09411a.css'
      - 'atlas-navigation-09411b.js'
      - 'marker-state.js'
      - 'release-manifest.json'
      - 'atlas-bootstrap.js'
      - 'sw.js'
      - 'tools/navigation_observer_contract_09411b.mjs'
      - 'tools/navigation_browser_smoke_09411c.mjs'
      - '.github/workflows/navigation-09411b-regression.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Parse navigation and marker controllers
        run: |
          node --check atlas-navigation-09411b.js
          node --check marker-state.js
      - name: Run navigation glass and marker contract
        run: node tools/navigation_observer_contract_09411b.mjs

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-atlas-navigation-playwright-chromium-v1
      - name: Install Playwright
        run: |
          npm install --no-save playwright
          npx playwright install chromium --with-deps
      - name: Start local Atlas server
        run: |
          python -m http.server 4173 >/tmp/atlas-navigation-server.log 2>&1 &
          for attempt in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/atlas-navigation-server.log
          exit 1
      - name: Run real marker and interaction smoke
        id: browser_smoke
        continue-on-error: true
        env:
          ATLAS_URL: http://127.0.0.1:4173/
        run: |
          set -o pipefail
          node tools/navigation_browser_smoke_09411c.mjs 2>&1 | tee marker-browser-09412b1.log
      - name: Upload compact browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marker-browser-09412b1-${{ github.sha }}
          path: marker-browser-09412b1.log
          retention-days: 3
      - name: Enforce browser smoke result
        if: steps.browser_smoke.outcome == 'failure'
        run: exit 1
