name: Geospatial Final Base Candidate Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/geospatial-final-base-candidate-audit.yml'
      - 'tools/audit_geospatial_final_base_candidate.py'
      - 'data/geospatial/geospatial-final-base-candidate-trigger.json'
      - 'assets/world-map-4096.webp'
      - 'app.js'
      - 'data/geospatial/geospatial-progress.json'

permissions:
  contents: write

concurrency:
  group: geospatial-final-base-candidate-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile final-base auditor
        run: python -m py_compile tools/audit_geospatial_final_base_candidate.py

      - name: Record candidate bytes before audit
        id: before
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          path = Path('assets/world-map-4096.webp')
          digest = hashlib.sha256(path.read_bytes()).hexdigest()
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'sha256={digest}\n')
              handle.write(f'size={path.stat().st_size}\n')
          print({'sha256': digest, 'sizeBytes': path.stat().st_size})
          PY

      - name: Audit current render-base candidate
        run: python tools/audit_geospatial_final_base_candidate.py

      - name: Validate truthful blocked state
        env:
          BEFORE_SHA256: ${{ steps.before.outputs.sha256 }}
          BEFORE_SIZE: ${{ steps.before.outputs.size }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          asset = Path('assets/world-map-4096.webp')
          report = json.loads(Path('data/geospatial/geospatial-final-base-candidate-audit.json').read_text(encoding='utf-8'))
          progress = json.loads(Path('data/geospatial/geospatial-progress.json').read_text(encoding='utf-8'))

          assert hashlib.sha256(asset.read_bytes()).hexdigest() == os.environ['BEFORE_SHA256']
          assert asset.stat().st_size == int(os.environ['BEFORE_SIZE'])
          assert report['status'] == 'current-render-base-audited-final-base-blocked'
          assert report['candidate']['path'] == 'assets/world-map-4096.webp'
          assert report['candidate']['format'] == 'webp'
          assert report['candidate']['width'] == 4096
          assert report['candidate']['height'] == 4096
          assert report['candidate']['sha256'] == os.environ['BEFORE_SHA256']
          assert report['rendererContract']['assetReferenceVerified'] is True
          assert report['rendererContract']['dimensionReferenceVerified'] is True
          assert report['gates']['sourceAuthorizationFixed'] is False
          assert report['gates']['finalCropFixed'] is False
          assert report['gates']['overlayOriginFixed'] is False
          assert report['gates']['finalBaseApproved'] is False
          assert len(report['blockingItems']) == 4
          assert report['safety'] == {
              'candidatePixelsModified': False,
              'pixelCoordinatesInvented': False,
              'cropInvented': False,
              'transformClaimed': False,
              'finalBaseClaimed': False,
          }

          final_base = progress['stageGates']['finalOriginalUltraHdBase']
          assert final_base['status'] == 'in_progress'
          assert final_base['candidateAuditStatus'] == report['status']
          assert final_base['candidateSha256'] == report['candidate']['sha256']
          assert final_base['candidateDimensions'] == {'width': 4096, 'height': 4096}
          assert progress['stageGates']['coordinateAndOverlayCalibration']['pixelTransformStatus'] == \
              'blocked_pending_final_base_approval_crop_and_origin'
          assert not list(Path('data').rglob('*.jpg'))
          assert not list(Path('data').rglob('*.png'))
          assert not list(Path('data').rglob('*.webp'))
          assert not list(Path('data').rglob('*.mp4'))
          print(json.dumps({
              'status': report['status'],
              'candidate': report['candidate'],
              'blockingItems': report['blockingItems'],
          }, ensure_ascii=False))
          PY

      - name: Stage non-pixel audit outputs
        run: |
          rm -rf /tmp/geospatial-final-base-audit
          mkdir -p /tmp/geospatial-final-base-audit/data/geospatial
          cp data/geospatial/geospatial-final-base-candidate-audit.json \
            /tmp/geospatial-final-base-audit/data/geospatial/
          cp data/geospatial/geospatial-progress.json \
            /tmp/geospatial-final-base-audit/data/geospatial/

      - name: Atomically publish audit report
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4 5 6; do
            git fetch origin "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"
            mkdir -p data/geospatial
            cp /tmp/geospatial-final-base-audit/data/geospatial/geospatial-final-base-candidate-audit.json data/geospatial/
            cp /tmp/geospatial-final-base-audit/data/geospatial/geospatial-progress.json data/geospatial/
            git add \
              data/geospatial/geospatial-final-base-candidate-audit.json \
              data/geospatial/geospatial-progress.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Audit current 4096 render base without final promotion [skip ci]'
            if git push origin "HEAD:$TARGET_BRANCH"; then exit 0; fi
            sleep $((attempt * 4))
          done
          exit 1

      - name: Delete transient staging
        if: always()
        run: |
          rm -rf /tmp/geospatial-final-base-audit
          test ! -e /tmp/geospatial-final-base-audit
