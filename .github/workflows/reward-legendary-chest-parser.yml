name: Reward Legendary Chest Parser

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/reward-legendary-chest-parser.yml'
      - 'tools/apply_legendary_chest_reward_parser_patch.py'
      - 'tools/research_reward_translation_batch.py'
      - 'data/rewards/reward-translation-research-policy.json'
      - 'data/rewards/reward-legendary-chest-parser-trigger.json'
  pull_request:
    paths:
      - '.github/workflows/reward-legendary-chest-parser.yml'
      - 'tools/apply_legendary_chest_reward_parser_patch.py'
      - 'tools/research_reward_translation_batch.py'
      - 'data/rewards/reward-translation-research-policy.json'
      - 'data/rewards/reward-legendary-chest-parser-trigger.json'

permissions:
  contents: write
  models: read

concurrency:
  group: reward-legendary-chest-parser-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-build-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply bounded parser patch
        run: |
          python -m py_compile \
            tools/apply_legendary_chest_reward_parser_patch.py \
            tools/research_reward_translation_batch.py
          python tools/apply_legendary_chest_reward_parser_patch.py
          python -m py_compile tools/build_reward_summary_catalog.py

      - name: Rebuild records to expose newly extracted names
        run: python tools/build_reward_summary_catalog.py

      - name: Block unknown source placeholders during translation
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          lexicon_path = Path('data/rewards/reward-translation-lexicon-zh-CN.json')
          evidence_path = Path('data/rewards/reward-translation-evidence.json')
          lexicon = json.loads(lexicon_path.read_text(encoding='utf-8'))
          evidence = json.loads(evidence_path.read_text(encoding='utf-8')) if evidence_path.exists() else {
              'schemaVersion': 1,
              'release': '0.9.4.8',
              'locale': 'zh-CN',
              'translations': {},
          }
          marker = '__ATLAS_BLOCKED_PLACEHOLDER__'
          blocked = ('??', '?? Mon', '?? Banner', '?? Weapon')
          exact = lexicon.setdefault('exactNames', {})
          translations = evidence.setdefault('translations', {})
          for original in blocked:
              exact[original] = marker
              translations.pop(original, None)
          lexicon_path.write_text(json.dumps(lexicon, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          evidence_path.write_text(json.dumps(evidence, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Translate newly extracted reward proper names
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python tools/research_reward_translation_batch.py

      - name: Remove temporary placeholder markers
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          lexicon_path = Path('data/rewards/reward-translation-lexicon-zh-CN.json')
          evidence_path = Path('data/rewards/reward-translation-evidence.json')
          lexicon = json.loads(lexicon_path.read_text(encoding='utf-8'))
          evidence = json.loads(evidence_path.read_text(encoding='utf-8'))
          marker = '__ATLAS_BLOCKED_PLACEHOLDER__'
          blocked = ('??', '?? Mon', '?? Banner', '?? Weapon')
          exact = lexicon.setdefault('exactNames', {})
          translations = evidence.setdefault('translations', {})
          for original in blocked:
              if exact.get(original) == marker or original.startswith('??'):
                  exact.pop(original, None)
              translations.pop(original, None)
          lexicon_path.write_text(json.dumps(lexicon, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          evidence_path.write_text(json.dumps(evidence, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Rebuild all reward records with translated names
        run: python tools/build_reward_summary_catalog.py

      - name: Run reward evidence contract matrix
        run: node tools/reward_evidence_contract_smoke.mjs

      - name: Validate explicit legendary chest extraction
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          catalog = json.loads(Path('data/rewards/reward-summary-catalog.json').read_text(encoding='utf-8'))
          audit = json.loads(Path('data/rewards/reward-source-audit.json').read_text(encoding='utf-8'))
          state = json.loads(Path('data/rewards/reward-translation-research-state.json').read_text(encoding='utf-8'))
          evidence = json.loads(Path('data/rewards/reward-translation-evidence.json').read_text(encoding='utf-8'))
          records = catalog['records']
          expected = {
              'location-mapgenie-438759': 'Scale of the Koi',
              'location-mapgenie-437354': 'Armor of the Legendary Samurai',
              'location-mapgenie-434597': 'Tools Master Mask',
              'location-mapgenie-438443': 'Lengthened Horizon',
              'location-mapgenie-438314': "Yukimitsu's Revenge",
              'location-mapgenie-438765': 'Armor Eater',
              'location-mapgenie-435068': 'Demon Tooth',
          }
          for location_id, original in expected.items():
              record = records[location_id]
              assert record['status'] in {'high_confidence_inference', 'multi_source_confirmed'}, (location_id, record['status'])
              assert record['rewards'], location_id
              reward = next(item for item in record['rewards'] if item['nameOriginal'] == original)
              assert reward['rarity'] == 'legendary', (location_id, reward)
              assert re.search(r'[\u3400-\u9fff]', reward['nameZhCN']), (location_id, reward)
              assert '具体名称待核对' not in reward['nameZhCN'], (location_id, reward)
              assert record['evidence'], location_id

          parsed_chests = []
          for record in records.values():
              if record.get('categoryId') != 'category-12342-legendary-chest':
                  continue
              if not record.get('rewards'):
                  continue
              parsed_chests.append(record)
              for reward in record['rewards']:
                  assert reward.get('nameOriginal') and not reward['nameOriginal'].startswith('??'), (record['locationId'], reward)
                  assert re.search(r'[\u3400-\u9fff]', reward.get('nameZhCN') or ''), (record['locationId'], reward)
                  assert '具体名称待核对' not in reward['nameZhCN'], (record['locationId'], reward)

          assert parsed_chests
          assert catalog['recordCount'] == 3430
          assert catalog['coverage']['total'] == 3430
          assert audit['invariants']['exactly3430Records']
          assert audit['invariants']['oneRecordPerLocation']
          assert audit['invariants']['coverageConserved']
          assert audit['invariants']['batchLimitRespected']
          assert audit['statusCounts']['unresolved'] < 2533
          assert not any(state['safety'].values())
          assert not any(original.startswith('??') for original in evidence.get('translations', {}))
          print(
              f"Legendary chest extraction validated: {len(parsed_chests)} parsed chests; "
              f"unresolved now {audit['statusCounts']['unresolved']}; "
              f"other translation candidates remaining {state['remainingCandidateNames']}."
          )
          PY

      - name: Commit parser, translations and regenerated catalog
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            tools/build_reward_summary_catalog.py \
            data/rewards/reward-translation-lexicon-zh-CN.json \
            data/rewards/reward-translation-evidence.json \
            data/rewards/reward-translation-research-state.json \
            data/rewards/reward-summary-catalog.json \
            data/rewards/reward-source-audit.json \
            data/rewards/reward-research-queue.json \
            data/rewards/reward-evidence-index.json \
            data/rewards/records \
            data/conflict-reports/reward-evidence-matrix.json
          if git diff --cached --quiet; then
            echo 'No parser, translation or reward changes.'
            exit 0
          fi
          git commit -m 'Extract and translate explicit legendary chest rewards [skip ci]'
          for attempt in 1 2 3 4 5 6; do
            if git pull --rebase origin "$TARGET_BRANCH" && git push origin "HEAD:$TARGET_BRANCH"; then
              exit 0
            fi
            echo "Parser publish attempt ${attempt} collided with a concurrent update; retrying."
            git rebase --abort || true
            sleep $((attempt * 6))
          done
          exit 1
