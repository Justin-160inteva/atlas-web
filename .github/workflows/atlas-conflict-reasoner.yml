name: Atlas conflict reasoner

on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/conflict-reports/**'
      - 'data/audits/**'
      - 'data/runtime-progress/**'
      - 'data/analysis-results/**'
      - 'data/analysis-jobs/**'
      - 'data/analysis-index.json'
      - 'data/eleven-game-world-ac-shadows-catalog.json'
      - 'data/batch-analysis/eleven-pilot-scan-queue.json'
      - 'data/batch-analysis/eleven-pilot-scan-status.json'
      - 'data/batch-analysis/eleven-pilot-recovery-report.json'
      - 'data/batch-analysis/eleven-pilot-orchestration-report.json'
      - 'data/batch-analysis/eleven-heartbeat-supervisor-state.json'
      - 'data/batch-analysis/eleven-pilot-v2-trigger.json'
      - 'data/batch-analysis/scan-system-health.json'
      - 'CONFLICT-REPORT.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atlas-conflict-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reason-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Compile and select risk-budgeted validation plan
        id: validation
        run: |
          python -m py_compile tools/select_release_validation.py
          python tools/select_release_validation.py --github-output "$GITHUB_OUTPUT"

      - name: Show validation plan
        run: |
          echo "tier=${{ steps.validation.outputs.tier }}"
          echo "changed=${{ steps.validation.outputs.changed_count }}"
          cat data/audits/release-validation-budget.json

      - name: Verify release manifest synchronization
        run: python tools/sync_release_manifest.py

      - name: Parse release JavaScript
        run: |
          node --check atlas-bootstrap.js
          node --check atlas-analysis-import.js
          node --check atlas-liquid-nav-0934.js
          node --check atlas-controls-0938.js
          node --check atlas-ipad-nav-0940.js
          node --check atlas-settings.js
          node --check atlas-evidence-studio.js
          node --check atlas-data-guard-0939.js
          node --check atlas-i18n.js
          node --check location-names.js
          node --check location-title-polish.js
          node --check location-search-patch.js
          node --check atlas-080.js
          node --check atlas-ui-fix-0931.js
          node --check page-zoom-guard.js
          node --check scan-monitor.js
          node --check tools/data_center_contract_smoke.mjs
          node --check tools/reward_evidence_contract_smoke.mjs
          node --check tools/reward_search_contract_smoke.mjs
          node --check tools/reward_search_browser_smoke.mjs
          node --check tools/viewport_scale_contract_smoke.mjs
          node --check tools/ipad_landscape_viewport_smoke.mjs
          node --check tools/monitor_batch_authority_smoke.mjs
          node --check sw.js

      - name: Compile heartbeat, ordering, schema, audit, and recovery tools
        run: |
          python -m py_compile tools/supervise_runtime_heartbeat.py
          python -m py_compile tools/heartbeat_system_smoke.py
          python -m py_compile tools/serial_queue_order_smoke.py
          python -m py_compile tools/queue_schema_smoke.py
          python -m py_compile tools/run_scan_with_auto_recovery.py
          python -m py_compile tools/run_scan_with_auto_recovery_v2.py
          python -m py_compile tools/audit_scan_system_v3.py
          python -m py_compile tools/full_project_audit_0948.py

      - name: Run static conflict reasoner
        run: python tools/atlas_conflict_reasoner_v3.py

      - name: Run reward search ownership contract
        run: node tools/reward_search_contract_smoke.mjs

      - name: Run cross-device viewport scale matrix
        run: node tools/viewport_scale_contract_smoke.mjs

      - name: Run unified data center matrix when relevant
        if: steps.validation.outputs.run_data_center == 'true'
        run: node tools/data_center_contract_smoke.mjs

      - name: Run reward evidence matrix when relevant
        if: steps.validation.outputs.run_reward == 'true'
        run: node tools/reward_evidence_contract_smoke.mjs

      - name: Run risk-budgeted heartbeat matrix
        if: steps.validation.outputs.run_heartbeat == 'true'
        env:
          ATLAS_CHECKS: ${{ steps.validation.outputs.heartbeat_checks }}
          ATLAS_VALIDATION_TIER: ${{ steps.validation.outputs.tier }}
        run: python tools/heartbeat_system_smoke.py

      - name: Run risk-budgeted serial queue order matrix
        if: steps.validation.outputs.run_serial == 'true'
        env:
          ATLAS_CHECKS: ${{ steps.validation.outputs.serial_checks }}
          ATLAS_VALIDATION_TIER: ${{ steps.validation.outputs.tier }}
        run: python tools/serial_queue_order_smoke.py

      - name: Run risk-budgeted queue schema matrix
        if: steps.validation.outputs.run_queue_schema == 'true'
        env:
          ATLAS_CHECKS: ${{ steps.validation.outputs.queue_schema_checks }}
          ATLAS_VALIDATION_TIER: ${{ steps.validation.outputs.tier }}
        run: python tools/queue_schema_smoke.py

      - name: Run scheduled full project audit
        if: steps.validation.outputs.run_full_audit == 'true'
        run: python tools/full_project_audit_0948.py

      - name: Install Playwright Chromium only when browser validation is required
        if: steps.validation.outputs.run_playwright == 'true'
        run: |
          npm install --no-save playwright@1.52.0
          npx playwright install --with-deps chromium

      - name: Start local Atlas server only for browser validation
        if: steps.validation.outputs.run_playwright == 'true'
        run: |
          python -m http.server 4173 > /tmp/atlas-server.log 2>&1 &
          echo $! > /tmp/atlas-server.pid
          for i in {1..30}; do curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0; sleep 1; done
          cat /tmp/atlas-server.log
          exit 1

      - name: Run browser conflict matrix when UI changes
        if: steps.validation.outputs.run_browser == 'true'
        env:
          ATLAS_URL: http://127.0.0.1:4173/
        run: node tools/browser_conflict_smoke.mjs

      - name: Run iPad portrait-to-landscape viewport stability gate
        if: steps.validation.outputs.run_browser == 'true'
        env:
          ATLAS_URL: http://127.0.0.1:4173/
        run: node tools/ipad_landscape_viewport_smoke.mjs

      - name: Run mobile and iPad reward search matrix
        if: steps.validation.outputs.run_browser == 'true'
        env:
          ATLAS_URL: http://127.0.0.1:4173/
        run: node tools/reward_search_browser_smoke.mjs

      - name: Run monitor batch authority matrix when monitor changes
        if: steps.validation.outputs.run_monitor == 'true'
        env:
          ATLAS_URL: http://127.0.0.1:4173/
        run: node tools/monitor_batch_authority_smoke.mjs

      - name: Upload selected validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-conflict-reports-${{ github.sha }}
          path: |
            CONFLICT-REPORT.md
            data/conflict-reports/*.json
            data/audits/*.json
            data/batch-analysis/scan-system-health.json
          if-no-files-found: warn

      - name: Persist reports on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add CONFLICT-REPORT.md data/conflict-reports data/audits data/batch-analysis/scan-system-health.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Update Atlas selected validation reports [skip ci]'
          git push
