name: Build Dada temple geospatial stage 1

on:
  push:
    branches: [main]
    paths:
      - 'tools/build_dada_temples_geospatial_stage1.py'
      - '.github/workflows/dada-temples-geospatial-stage1.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dada-temples-geospatial-stage1
  cancel-in-progress: true

jobs:
  build-stage1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile stage 1 builder
        id: compile
        run: python -m py_compile tools/build_dada_temples_geospatial_stage1.py

      - name: Build candidate index and temporal scaffold
        id: build
        run: python tools/build_dada_temples_geospatial_stage1.py

      - name: Run 400-round no-guess integrity gate
        id: gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          for _ in range(400):
              stage = json.loads(Path('data/geospatial/dada-temples-36-stage1.json').read_text(encoding='utf-8'))
              job = json.loads(Path('data/analysis-jobs/dada-temples-36-geospatial.json').read_text(encoding='utf-8'))
              status = json.loads(Path('data/batch-analysis/dada-temples-36-geospatial-status.json').read_text(encoding='utf-8'))
              counts = stage['counts']
              slots = stage['temporalScaffold']['slots']
              candidates = stage['candidateTemples']

              assert stage['status'] == 'ready-for-transient-evidence-extraction'
              assert counts['videoClaimedTemples'] == 36
              assert counts['mapTempleCandidates'] == 38
              assert counts['temporalSlots'] == 36
              assert counts['linkedSlots'] == 0
              assert counts['unlinkedSlots'] == 36
              assert len(candidates) == 38
              assert len({row['locationId'] for row in candidates}) == 38
              assert len(slots) == 36
              assert [row['slot'] for row in slots] == list(range(1, 37))
              assert all(row['linkedLocationId'] is None for row in slots)
              assert all(row['linkConfidence'] == 'unlinked' for row in slots)
              assert stage['noGuessPolicy']['enabled'] is True
              assert stage['source']['videoRetained'] is False
              assert stage['source']['framePixelsRetained'] is False
              assert job['status'] == 'stage1-complete-evidence-pending'
              assert job['candidateTempleCount'] == 38
              assert job['linkedSlotCount'] == 0
              assert status['status'] == 'complete'
              assert all(status['checks'].values())
          PY

      - name: Persist stage 1 outputs
        id: persist
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/geospatial/dada-temples-36-stage1.json
          git add data/analysis-jobs/dada-temples-36-geospatial.json
          git add data/batch-analysis/dada-temples-36-geospatial-status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Build Dada temple geospatial stage 1 [skip ci]'
          for attempt in 1 2 3 4; do
            if git pull --rebase origin main && git push origin HEAD:main; then exit 0; fi
            git rebase --abort || true
            sleep $((attempt * 3))
          done
          exit 1

      - name: Record stage 1 workflow outcome
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          PERSIST_OUTCOME: ${{ steps.persist.outcome }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          steps = {
              'compile': os.environ.get('COMPILE_OUTCOME') or 'not-run',
              'build': os.environ.get('BUILD_OUTCOME') or 'not-run',
              'gate': os.environ.get('GATE_OUTCOME') or 'not-run',
              'persist': os.environ.get('PERSIST_OUTCOME') or 'not-run',
          }
          failed = next((name for name, value in steps.items() if value in {'failure', 'cancelled'}), None)
          payload = {
              'schemaVersion': 1,
              'status': os.environ.get('JOB_STATUS') or 'unknown',
              'failedStage': failed,
              'steps': steps,
              'runId': os.environ.get('GITHUB_RUN_ID'),
              'triggerSha': os.environ.get('GITHUB_SHA'),
              'recordedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
          }
          Path('/tmp/dada-temples-36-geospatial-stage1-workflow.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p data/batch-analysis
            cp /tmp/dada-temples-36-geospatial-stage1-workflow.json data/batch-analysis/dada-temples-36-geospatial-stage1-workflow.json
            git add data/batch-analysis/dada-temples-36-geospatial-stage1-workflow.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Record Dada temple geospatial stage 1 outcome [skip ci]'
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
