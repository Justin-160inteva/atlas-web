name: Performance and typography static check

on:
  push:
    paths:
      - 'performance-092.js'
      - 'performance-092.css'
      - 'atlas-typography-093.css'
      - 'atlas-hd-map.js'
      - 'atlas-hd-runtime.js'
      - 'atlas-analysis-import.js'
      - 'FONT-LICENSES.md'
      - 'sw.js'
      - '.github/workflows/performance-static-check.yml'
  pull_request:
    paths:
      - 'performance-092.js'
      - 'performance-092.css'
      - 'atlas-typography-093.css'
      - 'atlas-hd-map.js'
      - 'atlas-hd-runtime.js'
      - 'atlas-analysis-import.js'
      - 'FONT-LICENSES.md'
      - 'sw.js'
      - '.github/workflows/performance-static-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Parse JavaScript
        run: |
          node --check performance-092.js
          node --check atlas-hd-map.js
          node --check atlas-hd-runtime.js
          node --check atlas-analysis-import.js
          node --check sw.js
      - name: Parse typography CSS
        run: npx --yes prettier@3.3.3 --check atlas-typography-093.css
      - name: Verify runtime assets and policy
        run: |
          grep -q "performance-092.js" sw.js
          grep -q "performance-092.css" sw.js
          grep -q "atlas-typography-093.css" sw.js
          grep -q "atlas-typography-093.css" atlas-analysis-import.js
          grep -q "0.9.3.0" atlas-analysis-import.js
          grep -q "does not bundle, extract, redistribute" FONT-LICENSES.md
