name: Performance typography UI and route static check

on:
  push:
    paths:
      - 'performance-092.js'
      - 'performance-092.css'
      - 'atlas-typography-093.css'
      - 'atlas-ui-fix-0931.js'
      - 'atlas-ui-fix-0931.css'
      - 'atlas-smart-route-0932.css'
      - 'atlas-hd-map.js'
      - 'atlas-hd-runtime.js'
      - 'atlas-analysis-import.js'
      - 'FONT-LICENSES.md'
      - 'sw.js'
      - '.github/workflows/performance-static-check.yml'
  pull_request:
    paths:
      - 'performance-092.js'
      - 'performance-092.css'
      - 'atlas-typography-093.css'
      - 'atlas-ui-fix-0931.js'
      - 'atlas-ui-fix-0931.css'
      - 'atlas-smart-route-0932.css'
      - 'atlas-hd-map.js'
      - 'atlas-hd-runtime.js'
      - 'atlas-analysis-import.js'
      - 'FONT-LICENSES.md'
      - 'sw.js'
      - '.github/workflows/performance-static-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Parse JavaScript
        run: |
          node --check performance-092.js
          node --check atlas-ui-fix-0931.js
          node --check atlas-hd-map.js
          node --check atlas-hd-runtime.js
          node --check atlas-analysis-import.js
          node --check sw.js
      - name: Parse CSS
        run: |
          npx --yes postcss-cli@11.0.1 atlas-typography-093.css --output /tmp/atlas-typography-093.css
          npx --yes postcss-cli@11.0.1 atlas-ui-fix-0931.css --output /tmp/atlas-ui-fix-0931.css
          npx --yes postcss-cli@11.0.1 atlas-smart-route-0932.css --output /tmp/atlas-smart-route-0932.css
      - name: Verify runtime assets and policy
        run: |
          grep -q "performance-092.js" sw.js
          grep -q "performance-092.css" sw.js
          grep -q "atlas-typography-093.css" sw.js
          grep -q "atlas-ui-fix-0931.js" sw.js
          grep -q "atlas-ui-fix-0931.css" sw.js
          grep -q "atlas-smart-route-0932.css" sw.js
          grep -q "atlas-ui-fix-0931.js" atlas-analysis-import.js
          grep -q "atlas-ui-fix-0931.css" atlas-analysis-import.js
          grep -q "atlas-smart-route-0932.css" atlas-analysis-import.js
          grep -q "0.9.3.2" atlas-analysis-import.js
          grep -q "does not bundle, extract, redistribute" FONT-LICENSES.md

# Validation trigger: Alpha 0.9.3.2 responsive smart-route controls.
