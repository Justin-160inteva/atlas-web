name: Performance and UI syntax check

on:
  push:
    paths:
      - '*.js'
      - '*.css'
      - 'tools/*.py'
      - '.github/workflows/performance-static-check.yml'
  pull_request:
    paths:
      - '*.js'
      - '*.css'
      - 'tools/*.py'
      - '.github/workflows/performance-static-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Parse JavaScript
        run: |
          for file in *.js tools/*.mjs; do
            [ -f "$file" ] || continue
            node --check "$file"
          done
      - name: Compile Python tools
        run: python -m compileall -q tools
      - name: Parse critical CSS
        run: |
          for file in atlas-typography-093.css atlas-ui-fix-0931.css atlas-smart-route-0932.css atlas-liquid-nav-0933.css atlas-liquid-nav-0934.css atlas-nav-layout-0937.css atlas-controls-0938.css atlas-ipad-nav-0940.css; do
            npx --yes postcss-cli@11.0.1 "$file" --output "/tmp/$file"
          done
      - name: Verify release manifest drift
        run: python tools/sync_release_manifest.py
      - name: Point to canonical release gate
        run: echo 'Semantic conflicts and browser matrices are enforced by atlas-conflict-reasoner.yml.'
