name: Geospatial Original Labels Icons Final Review

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/geospatial-original-labels-icons-final-review.yml'
      - 'tools/build_geospatial_original_labels_icons_final_review.py'
      - 'data/geospatial/geospatial-original-labels-icons-final-review-plan.json'
      - 'data/geospatial/geospatial-original-labels-icons-final-review-trigger.json'
      - 'data/geospatial/geospatial-original-authored-base-skeleton.json'
      - 'data/geospatial/geospatial-original-terrain-coastline-v1.json'
      - 'assets/original-map/atlas-original-terrain-coastline-v1.svg'
      - 'data/categories.json'
      - 'data/locations.json'

permissions:
  contents: write

concurrency:
  group: geospatial-original-labels-icons-final-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile labels and icon generator
        run: python -m py_compile tools/build_geospatial_original_labels_icons_final_review.py

      - name: Record protected source hashes
        id: protected
        run: |
          python - <<'PY'
          import hashlib
          import os
          from pathlib import Path

          paths = {
              'legacy': Path('assets/world-map-4096.webp'),
              'terrain': Path('assets/original-map/atlas-original-terrain-coastline-v1.svg'),
              'terrain_manifest': Path('data/geospatial/geospatial-original-terrain-coastline-v1.json'),
          }
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              for key, path in paths.items():
                  digest = hashlib.sha256(path.read_bytes()).hexdigest()
                  handle.write(f'{key}_sha256={digest}\n')
                  print({'path': str(path), 'sha256': digest})
          PY

      - name: Generate original labels icons and review candidate
        run: python tools/build_geospatial_original_labels_icons_final_review.py

      - name: Validate labels icons authorship and freeze readiness
        env:
          LEGACY_SHA256: ${{ steps.protected.outputs.legacy_sha256 }}
          TERRAIN_SHA256: ${{ steps.protected.outputs.terrain_sha256 }}
          TERRAIN_MANIFEST_SHA256: ${{ steps.protected.outputs.terrain_manifest_sha256 }}
        run: |
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          svg_path = Path('assets/original-map/atlas-original-labels-icons-final-review-v1.svg')
          manifest_path = Path('data/geospatial/geospatial-original-labels-icons-final-review-v1.json')
          readiness_path = Path('data/geospatial/geospatial-original-final-canvas-readiness.json')
          progress_path = Path('data/geospatial/geospatial-progress.json')
          legacy_path = Path('assets/world-map-4096.webp')
          terrain_path = Path('assets/original-map/atlas-original-terrain-coastline-v1.svg')
          terrain_manifest_path = Path('data/geospatial/geospatial-original-terrain-coastline-v1.json')

          svg = svg_path.read_text(encoding='utf-8')
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          readiness = json.loads(readiness_path.read_text(encoding='utf-8'))
          progress = json.loads(progress_path.read_text(encoding='utf-8'))
          digest = hashlib.sha256(svg_path.read_bytes()).hexdigest()

          assert svg.startswith('<?xml version="1.0" encoding="UTF-8"?>')
          assert 'width="4096"' in svg and 'height="4096"' in svg
          assert 'viewBox="0 0 4096 4096"' in svg
          assert 'data-atlas-asset="original-labels-icons-final-review-v1"' in svg
          assert '<image' not in svg.lower()
          assert 'data:image/' not in svg.lower()
          assert '@import' not in svg.lower()
          assert not re.search(r'(?:href|src)\s*=\s*["\'](?:https?:|//)', svg, re.I)
          assert not re.search(r'url\(\s*["\']?https?://', svg, re.I)

          required_ids = {
              'authored-labels-icons-final-review',
              'authored-region-labels',
              'authored-confirmed-anchor-icons',
              'authored-icon-legend',
              'final-canvas-review-stamp',
              'atlas-icon-location',
              'atlas-icon-service',
              'atlas-icon-collectible',
              'atlas-icon-equipment',
              'atlas-icon-npc',
              'atlas-icon-other',
              'atlas-icon-activity',
              'atlas-icon-shrine',
              'atlas-icon-temple',
          }
          for identifier in required_ids:
              assert f'id="{identifier}"' in svg

          assert svg.count('<symbol id="atlas-icon-') == 9
          assert svg.count('class="atlas-new-region-label"') == 10
          assert svg.count('class="atlas-authored-anchor-icon"') == 50
          assert svg.count('class="atlas-icon-legend-entry"') == 9
          assert '#region-labels, #confirmed-anchor-guides { display:none !important; }' in svg

          assert manifest['status'] == 'original-labels-icons-final-review-candidate-ready'
          assert manifest['asset']['path'] == str(svg_path)
          assert manifest['asset']['format'] == 'svg'
          assert manifest['asset']['width'] == 4096
          assert manifest['asset']['height'] == 4096
          assert manifest['asset']['sizeBytes'] == svg_path.stat().st_size
          assert manifest['asset']['sha256'] == digest
          assert manifest['asset']['editableSource'] is True
          assert manifest['asset']['repositoryOwned'] is True
          assert manifest['counts'] == {
              'locations': 3430,
              'regionAssignedLocations': 3425,
              'unassignedLocations': 5,
              'regions': 10,
              'categories': 44,
              'categoryGroups': 7,
              'coreSymbols': 9,
              'confirmedAnchorIcons': 50,
              'labelOverlaps': 0,
              'reservedPanelOverlaps': 0,
          }
          assert len(manifest['categoryMappings']) == 44
          assert len({row['categoryId'] for row in manifest['categoryMappings']}) == 44
          assert len(manifest['regionLabelPlacements']) == 10
          assert manifest['anchorIconSummary']['shrine'] + manifest['anchorIconSummary']['temple'] == 50
          assert manifest['authorship'] == {
              'strategy': 'fully-original-authored-visual-base',
              'terrainSvgUsedAsRepositoryOwnedBase': True,
              'thirdPartyRasterUsed': False,
              'thirdPartyVectorUsed': False,
              'externalImages': 0,
              'externalFonts': 0,
              'embeddedRasterImages': 0,
              'proceduralSvgDefinitionsOnly': True,
          }
          assert all(value is False for value in manifest['claims'].values())

          assert readiness['status'] == 'final-canvas-review-candidate-blocked'
          assert readiness['automatedGateStatus'] == 'passed'
          assert all(readiness['automatedGates'].values())
          assert readiness['blockerCount'] == 2
          assert [row['id'] for row in readiness['blockers']] == ['unassigned-locations', 'human-visual-review']
          assert len(readiness['unassignedLocationGuides']) == 5
          assert readiness['humanVisualReview']['status'] == 'not_recorded'
          assert readiness['finalCanvasFreeze']['eligible'] is False
          assert readiness['finalCanvasFreeze']['frozen'] is False
          assert readiness['finalCanvasFreeze']['frozenSha256'] is None

          authored = progress['stageGates']['finalOriginalUltraHdBase']['authoredBase']
          assert authored['status'] == 'labels_icons_final_review_candidate_ready'
          assert authored['labelsIconsReviewPath'] == str(svg_path)
          assert authored['labelsIconsReviewManifestPath'] == str(manifest_path)
          assert authored['finalCanvasReadinessPath'] == str(readiness_path)
          assert authored['labelsIconsReviewSha256'] == digest
          assert authored['categoryMappingCount'] == 44
          assert authored['coreIconCount'] == 9
          assert authored['regionLabelCount'] == 10
          assert authored['confirmedAnchorIconCount'] == 50
          assert authored['labelOverlapCount'] == 0
          assert authored['finalCanvasFrozen'] is False
          assert authored['nextStage'] == 'human_visual_review_and_final_canvas_freeze'
          assert progress['stageGates']['coordinateAndOverlayCalibration']['pixelTransformStatus'] == 'blocked_pending_original_authored_final_canvas'

          assert hashlib.sha256(legacy_path.read_bytes()).hexdigest() == os.environ['LEGACY_SHA256']
          assert hashlib.sha256(terrain_path.read_bytes()).hexdigest() == os.environ['TERRAIN_SHA256']
          assert hashlib.sha256(terrain_manifest_path.read_bytes()).hexdigest() == os.environ['TERRAIN_MANIFEST_SHA256']
          assert not list(Path('assets/original-map').glob('*.png'))
          assert not list(Path('assets/original-map').glob('*.jpg'))
          assert not list(Path('assets/original-map').glob('*.webp'))

          print(json.dumps({
              'status': manifest['status'],
              'asset': manifest['asset'],
              'counts': manifest['counts'],
              'automatedGateStatus': readiness['automatedGateStatus'],
              'blockers': readiness['blockers'],
          }, ensure_ascii=False))
          PY

      - name: Stage labels icons review outputs
        run: |
          rm -rf /tmp/original-labels-icons-final-review-publish
          mkdir -p /tmp/original-labels-icons-final-review-publish/assets/original-map
          mkdir -p /tmp/original-labels-icons-final-review-publish/data/geospatial
          cp assets/original-map/atlas-original-labels-icons-final-review-v1.svg \
            /tmp/original-labels-icons-final-review-publish/assets/original-map/
          cp data/geospatial/geospatial-original-labels-icons-final-review-v1.json \
            /tmp/original-labels-icons-final-review-publish/data/geospatial/
          cp data/geospatial/geospatial-original-final-canvas-readiness.json \
            /tmp/original-labels-icons-final-review-publish/data/geospatial/
          cp data/geospatial/geospatial-progress.json \
            /tmp/original-labels-icons-final-review-publish/data/geospatial/

      - name: Atomically publish labels icons review candidate
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4 5 6; do
            git fetch origin "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"
            mkdir -p assets/original-map data/geospatial
            cp /tmp/original-labels-icons-final-review-publish/assets/original-map/atlas-original-labels-icons-final-review-v1.svg assets/original-map/
            cp /tmp/original-labels-icons-final-review-publish/data/geospatial/geospatial-original-labels-icons-final-review-v1.json data/geospatial/
            cp /tmp/original-labels-icons-final-review-publish/data/geospatial/geospatial-original-final-canvas-readiness.json data/geospatial/
            cp /tmp/original-labels-icons-final-review-publish/data/geospatial/geospatial-progress.json data/geospatial/
            git add \
              assets/original-map/atlas-original-labels-icons-final-review-v1.svg \
              data/geospatial/geospatial-original-labels-icons-final-review-v1.json \
              data/geospatial/geospatial-original-final-canvas-readiness.json \
              data/geospatial/geospatial-progress.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Generate original labels icons final review candidate [skip ci]'
            if git push origin "HEAD:$TARGET_BRANCH"; then exit 0; fi
            sleep $((attempt * 4))
          done
          exit 1

      - name: Delete transient publish staging
        if: always()
        run: |
          rm -rf /tmp/original-labels-icons-final-review-publish
          test ! -e /tmp/original-labels-icons-final-review-publish
