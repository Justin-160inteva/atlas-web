name: Geospatial Sakai 2.5D Transient Evidence

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/geospatial-2p5d-sakai-transient-evidence.yml'
      - 'tools/plan_geospatial_2p5d_sakai_transient_timestamps.py'
      - 'tools/download_authorized_bilibili_page_by_cid.py'
      - 'tools/extract_geospatial_2p5d_sakai_transient_evidence.py'
      - 'data/geospatial/geospatial-2p5d-sakai-pilot-evidence-plan.json'
      - 'data/geospatial/geospatial-2p5d-pilot-coverage-audit.json'
      - 'data/analysis-jobs/eleven-p013.json'
      - 'data/analysis-jobs/eleven-p014.json'
      - 'data/analysis-jobs/eleven-p015.json'
      - 'data/analysis-jobs/eleven-p016.json'
      - 'data/analysis-results/eleven-p013.json'
      - 'data/analysis-results/eleven-p014.json'
      - 'data/analysis-results/eleven-p015.json'
      - 'data/analysis-results/eleven-p016.json'
      - 'data/authorizations.json'

permissions:
  contents: write

concurrency:
  group: geospatial-sakai-2p5d-transient-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install planning dependency
        run: python -m pip install numpy

      - name: Compile transient evidence tools
        run: |
          python -m py_compile \
            tools/plan_geospatial_2p5d_sakai_transient_timestamps.py \
            tools/download_authorized_bilibili_page_by_cid.py \
            tools/extract_geospatial_2p5d_sakai_transient_evidence.py

      - name: Build deterministic timestamp plan
        run: python tools/plan_geospatial_2p5d_sakai_transient_timestamps.py

      - name: Validate timestamp plan and authorization scope
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          plan = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-pilot-evidence-plan.json').read_text(encoding='utf-8'))
          timestamps = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-transient-timestamp-plan.json').read_text(encoding='utf-8'))
          authorizations = json.loads(Path('data/authorizations.json').read_text(encoding='utf-8'))
          auth = next(row for row in authorizations['records'] if row['id'] == plan['authorizationId'])
          assert auth['status'] == 'active'
          for key in ('localDownloadAndAnalysis', 'computerVisionAnalysis', 'privateLowResolutionKeyframes',
                      'original2DVectorReconstruction', 'original3DReconstruction', 'roadReconstruction',
                      'terrainReconstruction', 'waterAndBoundaryReconstruction', 'geospatialAnchoring'):
              assert auth['scope'][key] is True, key
          assert timestamps['status'] == 'transient-timestamp-plan-ready'
          assert timestamps['counts'] == {'videos': 4, 'timestampsPerVideo': 96, 'totalTimestamps': 384}
          assert len(timestamps['videos']) == 4
          for video in timestamps['videos']:
              assert video['page'] in {13, 14, 15, 16}
              assert isinstance(video['cid'], int) and video['cid'] > 0
              assert len(video['timestamps']) == 96
              assert len({row['time'] for row in video['timestamps']}) == 96
          assert timestamps['safety'] == {
              'framePixelsGenerated': False,
              'videosDownloaded': False,
              'geometryGenerated': False,
              'existingAnalysisModified': False,
          }
          PY

  extract:
    needs: plan
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - job_id: eleven-p013-v2
            job_path: data/analysis-jobs/eleven-p013.json
          - job_id: eleven-p014-v2
            job_path: data/analysis-jobs/eleven-p014.json
          - job_id: eleven-p015-v2
            job_path: data/analysis-jobs/eleven-p015.json
          - job_id: eleven-p016-v2
            job_path: data/analysis-jobs/eleven-p016.json
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install transient dependencies
        run: |
          python -m pip install numpy opencv-python-headless curl-cffi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg curl

      - name: Build timestamp plan locally
        run: python tools/plan_geospatial_2p5d_sakai_transient_timestamps.py

      - name: Download authorized page by explicit CID
        run: |
          rm -rf /tmp/sakai-video-${{ matrix.job_id }} /tmp/sakai-evidence-${{ matrix.job_id }}
          mkdir -p /tmp/sakai-video-${{ matrix.job_id }} /tmp/sakai-evidence-${{ matrix.job_id }}
          python tools/download_authorized_bilibili_page_by_cid.py \
            --job '${{ matrix.job_path }}' \
            --output-dir /tmp/sakai-video-${{ matrix.job_id }} \
            --quality 32

      - name: Extract low-resolution transient review frames
        run: |
          python tools/extract_geospatial_2p5d_sakai_transient_evidence.py \
            --video /tmp/sakai-video-${{ matrix.job_id }}/${{ matrix.job_id }}.mp4 \
            --job-id '${{ matrix.job_id }}' \
            --output-dir /tmp/sakai-evidence-${{ matrix.job_id }} \
            --run-id '${{ github.run_id }}'

      - name: Run per-video evidence gate
        run: |
          JOB_ID='${{ matrix.job_id }}' python - <<'PY'
          import json, os
          from pathlib import Path
          job_id = os.environ['JOB_ID']
          root = Path(f'/tmp/sakai-evidence-{job_id}')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          assert manifest['status'] == 'transient-artifact-ready'
          assert manifest['jobId'] == job_id
          assert manifest['authorizationId'] == 'auth-eleven-game-world-20260719'
          assert len(manifest['extraction']['frames']) == 96
          assert len(manifest['extraction']['contactSheets']) == 6
          assert all((root / row['filename']).is_file() for row in manifest['extraction']['frames'])
          assert all((root / row['filename']).is_file() for row in manifest['extraction']['contactSheets'])
          assert manifest['privacy'] == {
              'repositoryContainsPixels': False,
              'artifactContainsTransientPixels': True,
              'artifactRetentionDays': 1,
              'originalVideoIncludedInArtifact': False,
          }
          assert not list(Path('data').rglob('*.jpg'))
          assert not list(Path('data').rglob('*.png'))
          assert not list(Path('data').rglob('*.mp4'))
          PY

      - name: Upload one-day transient evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-sakai-2p5d-${{ matrix.job_id }}-${{ github.run_id }}
          path: /tmp/sakai-evidence-${{ matrix.job_id }}
          retention-days: 1
          compression-level: 6
          if-no-files-found: error

      - name: Delete transient source and frame pixels
        if: always()
        run: |
          rm -rf /tmp/sakai-video-${{ matrix.job_id }} /tmp/sakai-evidence-${{ matrix.job_id }}
          test ! -e /tmp/sakai-video-${{ matrix.job_id }}
          test ! -e /tmp/sakai-evidence-${{ matrix.job_id }}

  finalize:
    needs: [plan, extract]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install planning dependency
        run: python -m pip install numpy

      - name: Rebuild timestamp plan and finalize non-pixel manifest
        run: |
          python tools/plan_geospatial_2p5d_sakai_transient_timestamps.py
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          plan = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-pilot-evidence-plan.json').read_text(encoding='utf-8'))
          timestamps = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-transient-timestamp-plan.json').read_text(encoding='utf-8'))
          run_id = os.environ['GITHUB_RUN_ID']
          jobs = [row['jobId'] for row in timestamps['videos']]
          payload = {
              'schemaVersion': 1,
              'generatedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'status': 'transient-artifacts-uploaded-awaiting-visual-review',
              'stage': plan['stage'],
              'runId': run_id,
              'authorizationId': plan['authorizationId'],
              'pilotScope': plan['pilotScope'],
              'timestampPlanPath': plan['outputs']['timestampPlan'],
              'counts': {
                  'videos': 4,
                  'frames': 384,
                  'contactSheets': 24,
                  'artifacts': 4,
              },
              'artifacts': [
                  {
                      'jobId': job_id,
                      'name': f'atlas-sakai-2p5d-{job_id}-{run_id}',
                      'retentionDays': 1,
                      'containsOriginalVideo': False,
                      'containsLowResolutionReviewFrames': True,
                  }
                  for job_id in jobs
              ],
              'privacy': {
                  'repositoryContainsPixels': False,
                  'artifactContainsTransientPixels': True,
                  'originalVideoRetained': False,
                  'visualReviewRequiredBeforeDerivedGeometry': True,
              },
              'nextAction': 'download the four one-day artifacts, visually identify Sakai urban/waterfront time windows, then record only derived structural evidence and timestamps',
          }
          path = Path(plan['outputs']['artifactManifest'])
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          outcome = {
              'schemaVersion': 1,
              'status': 'success',
              'runId': run_id,
              'stage': plan['stage'],
              'timestampPlan': plan['outputs']['timestampPlan'],
              'artifactManifest': plan['outputs']['artifactManifest'],
              'recordedAt': payload['generatedAt'],
          }
          outcome_path = Path(plan['outputs']['workflowOutcome'])
          outcome_path.parent.mkdir(parents=True, exist_ok=True)
          outcome_path.write_text(json.dumps(outcome, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Validate non-pixel final outputs
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          timestamps = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-transient-timestamp-plan.json').read_text(encoding='utf-8'))
          manifest = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-transient-evidence-manifest.json').read_text(encoding='utf-8'))
          assert timestamps['counts']['totalTimestamps'] == 384
          assert manifest['status'] == 'transient-artifacts-uploaded-awaiting-visual-review'
          assert manifest['counts'] == {'videos': 4, 'frames': 384, 'contactSheets': 24, 'artifacts': 4}
          assert len(manifest['artifacts']) == 4
          assert manifest['privacy']['repositoryContainsPixels'] is False
          assert not list(Path('data').rglob('*.jpg'))
          assert not list(Path('data').rglob('*.png'))
          assert not list(Path('data').rglob('*.mp4'))
          PY

      - name: Publish timestamp plan and non-pixel manifests atomically
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          rm -rf /tmp/sakai-2p5d-finalize
          mkdir -p /tmp/sakai-2p5d-finalize/data/geospatial /tmp/sakai-2p5d-finalize/data/batch-analysis
          cp data/geospatial/geospatial-2p5d-sakai-transient-timestamp-plan.json /tmp/sakai-2p5d-finalize/data/geospatial/
          cp data/geospatial/geospatial-2p5d-sakai-transient-evidence-manifest.json /tmp/sakai-2p5d-finalize/data/geospatial/
          cp data/batch-analysis/geospatial-2p5d-sakai-transient-evidence-workflow.json /tmp/sakai-2p5d-finalize/data/batch-analysis/
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4 5 6; do
            git fetch origin "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"
            mkdir -p data/geospatial data/batch-analysis
            cp /tmp/sakai-2p5d-finalize/data/geospatial/*.json data/geospatial/
            cp /tmp/sakai-2p5d-finalize/data/batch-analysis/*.json data/batch-analysis/
            git add \
              data/geospatial/geospatial-2p5d-sakai-transient-timestamp-plan.json \
              data/geospatial/geospatial-2p5d-sakai-transient-evidence-manifest.json \
              data/batch-analysis/geospatial-2p5d-sakai-transient-evidence-workflow.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Record Sakai 2.5D transient evidence package [skip ci]'
            if git push origin "HEAD:$TARGET_BRANCH"; then exit 0; fi
            sleep $((attempt * 4))
          done
          exit 1

      - name: Delete finalization staging
        if: always()
        run: |
          rm -rf /tmp/sakai-2p5d-finalize
          test ! -e /tmp/sakai-2p5d-finalize
