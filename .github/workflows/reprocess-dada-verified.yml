name: Reprocess verified Dada queue item

on:
  pull_request:
    paths:
      - 'tools/reprocess_verified_dada_item_v2.py'
      - 'data/reprocess/dada-seq*.json'
      - '.github/workflows/reprocess-dada-verified.yml'
  push:
    branches: [main]
    paths:
      - 'tools/reprocess_verified_dada_item_v2.py'
      - 'data/reprocess/dada-seq*.json'
      - '.github/workflows/reprocess-dada-verified.yml'
  workflow_dispatch:
    inputs:
      manifest:
        description: Optional exact manifest path inside data/reprocess
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: reprocess-dada-verified
  cancel-in-progress: false

jobs:
  reprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out requested revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Select exactly one verified request
        id: select
        env:
          REQUESTED_MANIFEST: ${{ github.event.inputs.manifest || '' }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          queue = json.loads(Path('data/analysis-jobs/dada-quality-reprocess.json').read_text(encoding='utf-8'))
          requested = os.environ.get('REQUESTED_MANIFEST', '').strip()
          if requested:
              manifests = [Path(requested)]
          else:
              ready = queue.get('readyForReprocessSequences') or [
                  item['sequence'] for item in queue.get('items', [])
                  if item.get('safeToDownloadNow') is True and item.get('resolutionStatus') == 'verified'
              ]
              manifests = [Path(f'data/reprocess/dada-seq{int(sequence):02d}.json') for sequence in ready]
          manifests = [path for path in manifests if path.is_file()]
          if len(manifests) != 1:
              raise SystemExit(f'Expected exactly one verified manifest, found: {[str(path) for path in manifests]}')
          manifest = json.loads(manifests[0].read_text(encoding='utf-8'))
          sequence = int(manifest['sequence'])
          with Path(os.environ['GITHUB_OUTPUT']).open('a', encoding='utf-8') as output:
              output.write(f'manifest={manifests[0].as_posix()}\n')
              output.write(f'sequence={sequence}\n')
              output.write(f'padded={sequence:02d}\n')
          PY

      - name: Compile and run 400-round preflight gate
        run: |
          python -m py_compile tools/reprocess_verified_dada_item.py tools/reprocess_verified_dada_item_v2.py
          python tools/reprocess_verified_dada_item_v2.py '${{ steps.select.outputs.manifest }}' --validate-only --self-check-rounds 400

      - name: Install transient analysis dependencies
        if: github.event_name != 'pull_request'
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'yt-dlp[default,curl-cffi]' opencv-python-headless numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Reprocess the isolated verified source
        if: github.event_name != 'pull_request'
        env:
          PYTHONUNBUFFERED: '1'
        run: python tools/reprocess_verified_dada_item_v2.py '${{ steps.select.outputs.manifest }}' --self-check-rounds 400

      - name: Remove all transient media
        if: always() && github.event_name != 'pull_request'
        run: |
          find /tmp -maxdepth 1 -type d -name 'atlas-authorized-*' -exec rm -rf {} + || true
          find . -type f \( -name '*.mp4' -o -name '*.m4a' -o -name '*.webm' -o -name '*.flv' \) -delete

      - name: Rebuild Dada quality report and remaining queue
        if: github.event_name != 'pull_request'
        run: python tools/audit_dada_catalog.py

      - name: Run 400-round post-audit transition gate
        if: github.event_name != 'pull_request'
        run: python tools/reprocess_verified_dada_item_v2.py '${{ steps.select.outputs.manifest }}' --verify-transition --self-check-rounds 400

      - name: Upload replacement evidence
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dada-seq${{ steps.select.outputs.padded }}-verified-reprocess-${{ github.sha }}
          path: |
            data/reprocess/dada-seq${{ steps.select.outputs.padded }}.json
            data/analysis-results/dada-${{ steps.select.outputs.padded }}.json
            data/batch-analysis/dada-seq${{ steps.select.outputs.padded }}-reprocess-status.json
            data/batch-analysis/dada-catalog-quality-audit.json
            data/analysis-jobs/dada-quality-reprocess.json
          if-no-files-found: error

      - name: Commit verified replacement analysis
        if: github.event_name != 'pull_request'
        run: |
          PADDED='${{ steps.select.outputs.padded }}'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            "data/analysis-jobs/dada-${PADDED}.json" \
            "data/analysis-results/dada-${PADDED}.json" \
            data/analysis-index.json \
            data/dada-ac-shadows-catalog.json \
            data/batch-analysis/dada-author-catalog-status.json \
            "data/batch-analysis/dada-seq${PADDED}-reprocess-status.json" \
            data/batch-analysis/dada-catalog-quality-audit.json \
            data/analysis-jobs/dada-quality-reprocess.json
          if git diff --cached --quiet; then
            echo "No sequence ${PADDED} replacement changes."
            exit 0
          fi
          git commit -m "Reprocess Dada sequence ${PADDED} from verified source [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main
