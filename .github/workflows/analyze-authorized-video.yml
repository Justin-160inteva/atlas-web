name: Analyze authorized video

on:
  push:
    paths:
      - 'data/analysis-jobs/*.json'
  pull_request:
    paths:
      - 'data/analysis-jobs/*.json'
  workflow_dispatch:
    inputs:
      job_file:
        description: 'Path to an authorized analysis job JSON'
        required: true
        default: 'data/analysis-jobs/dada-temples-36.json'

permissions:
  contents: write

concurrency:
  group: authorized-video-analysis-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out writable source branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install yt-dlp opencv-python-headless numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Resolve job file
        id: job
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            JOB_FILE='${{ inputs.job_file }}'
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            JOB_FILE=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep '^data/analysis-jobs/.*\.json$' | head -n 1)
          else
            JOB_FILE=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" | grep '^data/analysis-jobs/.*\.json$' | head -n 1)
          fi
          if [ -z "$JOB_FILE" ] || [ ! -f "$JOB_FILE" ]; then
            echo "No valid job file found" >&2
            exit 1
          fi
          echo "job_file=$JOB_FILE" >> "$GITHUB_OUTPUT"

      - name: Download and analyze authorized source
        env:
          PYTHONUNBUFFERED: '1'
        run: python tools/analyze_authorized_video.py '${{ steps.job.outputs.job_file }}'

      - name: Remove any transient media
        if: always()
        run: |
          find /tmp -maxdepth 1 -type d -name 'atlas-authorized-*' -exec rm -rf {} + || true
          find . -type f \( -name '*.mp4' -o -name '*.m4a' -o -name '*.webm' \) -delete

      - name: Commit numeric analysis result
        shell: bash
        run: |
          if git diff --quiet -- data/analysis-results; then
            echo 'No analysis result changed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/analysis-results
          git commit -m 'Add authorized video analysis result'
          TARGET_BRANCH='${{ github.event.pull_request.head.ref || github.ref_name }}'
          git push origin "HEAD:${TARGET_BRANCH}"
