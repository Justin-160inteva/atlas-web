name: Atlas scan auto-recover closed loop

on:
  workflow_dispatch:
  schedule:
    - cron: '2-59/5 * * * *'
  push:
    branches: [main]
    paths:
      - 'data/batch-analysis/atlas-scan-autorecover-request.json'

permissions:
  contents: write
  actions: write
  models: read

concurrency:
  group: scan-eleven-regional-batch
  cancel-in-progress: false

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  reconcile-and-recover:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reconcile durable queue and runtime heartbeat
        id: reconcile
        run: |
          python tools/supervise_runtime_heartbeat.py data/batch-analysis/atlas-scan-autorecover-config.json
          python - <<'PY'
          import json, os
          report=json.load(open('data/batch-analysis/eleven-heartbeat-supervisor-state.json',encoding='utf-8'))
          queue=json.load(open('data/batch-analysis/eleven-pilot-scan-queue.json',encoding='utf-8'))
          imported=sum(item.get('state')=='imported' for item in queue.get('items',[]))
          resume=bool(report.get('resumeWorkflow'))
          actionable=resume or bool(report.get('queueChanged')) or bool(report.get('projectionWritten'))
          with open(os.environ['GITHUB_OUTPUT'],'a',encoding='utf-8') as output:
              output.write(f"resume={'true' if resume else 'false'}\n")
              output.write(f"actionable={'true' if actionable else 'false'}\n")
              output.write(f"decision={report.get('decision','unknown')}\n")
              output.write(f"imported_before={imported}\n")
          print(json.dumps({
              'decision':report.get('decision'),
              'repair':report.get('repair'),
              'resume':resume,
              'target':report.get('resumeTargetExternalSourceId'),
              'importedBefore':imported,
          },ensure_ascii=False))
          PY

      - name: Install scan dependencies only when recovery is required
        if: steps.reconcile.outputs.resume == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          python -m pip install --upgrade pip
          python -m pip install 'yt-dlp[default,curl-cffi]' opencv-python-headless numpy

      - name: Validate recovery stack without writing bytecode
        if: steps.reconcile.outputs.resume == 'true'
        run: |
          python - <<'PY'
          import ast, json, pathlib
          manifest=json.load(open('data/batch-analysis/eleven-pilot-scan-manifest.json',encoding='utf-8'))
          paths=[
              'tools/supervise_runtime_heartbeat.py',
              'tools/run_scan_with_auto_recovery.py',
              'tools/run_scan_with_auto_recovery_v2.py',
              'tools/diagnose_and_recover_scan_v2.py',
              'tools/scan_autonomous_repair.py',
              'tools/scan_catalog_queue_v2.py',
              manifest['analyzer'],
          ]
          for relative in paths:
              ast.parse(pathlib.Path(relative).read_text(encoding='utf-8'),filename=relative)
          print(f"validated {len(paths)} closed-loop source files")
          PY
          python tools/autonomous_scan_repair_smoke.py

      - name: Diagnose, repair and retry the same queue item
        id: scan
        if: steps.reconcile.outputs.resume == 'true'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          ATLAS_FORCE_HTTP11: '1'
          ATLAS_PARALLEL_RANGE_WORKERS: '8'
          PYTHONPATH: ${{ github.workspace }}/tools/p33_v14_hook
          GITHUB_TOKEN: ${{ github.token }}
          ATLAS_AI_REPAIR_TOKEN: ${{ github.token }}
          ATLAS_PROGRESS_TOKEN: ${{ github.token }}
          ATLAS_PROGRESS_REPOSITORY: ${{ github.repository }}
          ATLAS_PROGRESS_BRANCH: main
          ATLAS_PROGRESS_PATH: data/runtime-progress/eleven-pilot-progress.json
          ATLAS_PROGRESS_LOCAL_PATH: /tmp/atlas-runtime-progress.json
          ATLAS_PROGRESS_MIN_INTERVAL_SECONDS: '30'
          ATLAS_PROGRESS_CONFLICT_RETRIES: '5'
        run: |
          set +e
          python tools/run_scan_with_auto_recovery_v2.py data/batch-analysis/eleven-pilot-scan-manifest.json
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Remove transient media and restore interpreter caches
        if: always()
        run: |
          find /tmp -maxdepth 1 -type d -name 'atlas-authorized-*' -exec rm -rf {} + || true
          find . -type f \( -name '*.mp4' -o -name '*.m4a' -o -name '*.webm' -o -name '*.flv' \) -delete
          find . -type d -name '__pycache__' -prune -exec rm -rf {} +
          python - <<'PY'
          import subprocess
          tracked=subprocess.check_output(['git','ls-files'],text=True).splitlines()
          caches=[path for path in tracked if '/__pycache__/' in path or path.endswith(('.pyc','.pyo'))]
          if caches:
              subprocess.run(['git','restore','--source=HEAD','--staged','--worktree','--',*caches],check=True)
          PY

      - name: Verify recovered state and compute continuation
        if: always()
        id: decision
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          queue=json.load(open('data/batch-analysis/eleven-pilot-scan-queue.json',encoding='utf-8'))
          items=queue.get('items',[])
          imported=sum(item.get('state')=='imported' for item in items)
          before=int('${{ steps.reconcile.outputs.imported_before }}' or 0)
          complete=bool(items) and imported==len(items)
          progressed=imported>before
          print(f"imported={imported}")
          print(f"total={len(items)}")
          print(f"progressed={'true' if progressed else 'false'}")
          print(f"complete={'true' if complete else 'false'}")
          PY
          python tools/audit_scan_system_v4.py

      - name: Persist durable recovery changes only
        if: always() && (steps.reconcile.outputs.actionable == 'true' || steps.reconcile.outputs.resume == 'true')
        id: persist
        run: |
          echo "persisted=false" >> "$GITHUB_OUTPUT"
          git config user.name 'atlas-scan-autorecover[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            data/analysis-results \
            data/analysis-jobs \
            data/analysis-index.json \
            data/eleven-game-world-ac-shadows-catalog.json \
            data/batch-analysis/eleven-heartbeat-supervisor-state.json \
            data/batch-analysis/eleven-pilot-scan-queue.json \
            data/batch-analysis/eleven-pilot-scan-status.json \
            data/batch-analysis/eleven-pilot-recovery-report.json \
            data/batch-analysis/eleven-pilot-orchestration-report.json \
            data/batch-analysis/scan-autonomous-repair-report.json \
            data/batch-analysis/eleven-pilot-scan-manifest.json \
            data/scan-bug-dictionary.json \
            data/scan-autonomy-policy.json
          find tools -type f -name '*.py' -print0 | xargs -0 -r git add --
          if git diff --cached --name-only | grep -E '(^|/)__pycache__/|\.py[co]$'; then
            echo 'interpreter cache was staged' >&2
            exit 1
          fi
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Auto-recover authorized scan: ${{ steps.reconcile.outputs.decision }}"
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              pushed_sha=$(git rev-parse HEAD)
              git fetch origin main
              if git merge-base --is-ancestor "$pushed_sha" origin/main; then
                echo "persisted=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            fi
            git rebase --abort || true
            sleep $((attempt * 4))
          done
          exit 1

      - name: Continue with the next item after recovered import
        if: always() && steps.persist.outputs.persisted == 'true' && steps.decision.outputs.progressed == 'true' && steps.decision.outputs.complete != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run scan-eleven-pilot-v2.yml --ref main

      - name: Surface protected failure after durable reporting
        if: always() && steps.reconcile.outputs.resume == 'true' && steps.scan.outputs.code != '0'
        run: exit 1
