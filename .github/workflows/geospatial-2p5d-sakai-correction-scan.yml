name: Geospatial Sakai 2.5D Correction Scan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/geospatial-2p5d-sakai-correction-scan.yml'
      - 'tools/plan_geospatial_2p5d_sakai_correction_timestamps.py'
      - 'tools/extract_geospatial_2p5d_sakai_correction_evidence.py'
      - 'tools/download_authorized_bilibili_page_by_cid.py'
      - 'data/geospatial/geospatial-2p5d-sakai-correction-scan-plan.json'
      - 'data/geospatial/geospatial-2p5d-sakai-visual-evidence-review.json'
      - 'data/analysis-jobs/eleven-p013.json'
      - 'data/analysis-jobs/eleven-p015.json'
      - 'data/analysis-results/eleven-p013.json'
      - 'data/analysis-results/eleven-p015.json'
      - 'data/authorizations.json'

permissions:
  contents: write

concurrency:
  group: geospatial-sakai-2p5d-correction-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install transient dependencies
        run: |
          python -m pip install numpy opencv-python-headless curl-cffi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg curl

      - name: Compile tools and generate timestamp plan
        run: |
          python -m py_compile \
            tools/plan_geospatial_2p5d_sakai_correction_timestamps.py \
            tools/extract_geospatial_2p5d_sakai_correction_evidence.py \
            tools/download_authorized_bilibili_page_by_cid.py
          python tools/plan_geospatial_2p5d_sakai_correction_timestamps.py

      - name: Validate authorization and timestamp gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          plan = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-correction-scan-plan.json').read_text(encoding='utf-8'))
          timestamps = json.loads(Path(plan['outputs']['timestampPlan']).read_text(encoding='utf-8'))
          authorizations = json.loads(Path('data/authorizations.json').read_text(encoding='utf-8'))
          auth = next(row for row in authorizations['records'] if row['id'] == plan['authorizationId'])
          assert auth['status'] == 'active'
          for key in ('localDownloadAndAnalysis', 'computerVisionAnalysis', 'privateLowResolutionKeyframes',
                      'original2DVectorReconstruction', 'original3DReconstruction', 'roadReconstruction',
                      'terrainReconstruction', 'waterAndBoundaryReconstruction', 'geospatialAnchoring'):
              assert auth['scope'][key] is True, key
          assert timestamps['counts'] == {'jobs': 2, 'frames': 288, 'contactSheets': 18}
          assert timestamps['safety'] == {
              'pixelsRead': False,
              'pixelsGenerated': False,
              'geometryGenerated': False,
              'existingCoordinatesModified': False,
          }
          p13 = next(row for row in timestamps['jobs'] if row['id'] == 'p13-full-duration-correction')
          p15 = next(row for row in timestamps['jobs'] if row['id'] == 'p15-urban-dense-candidate')
          assert p13['frameCount'] == 96 and p13['contactSheetCount'] == 6
          assert p13['coverage']['coveredDurationFraction'] >= 0.97
          assert all(p13['coverage']['checks'].values())
          assert all(value >= 16 for value in p13['coverage']['quarterCounts'].values())
          assert p15['frameCount'] == 192 and p15['contactSheetCount'] == 12
          assert all(p15['checks'].values())
          assert p15['windowCounts'] == {
              'early-map-context': 8,
              'elevated-city-water-panorama': 20,
              'elevated-tiled-roof-compound': 32,
              'late-map-context-a': 8,
              'late-map-context-b': 8,
              'roof-and-compound-connectivity': 24,
              'settlement-road-watchtower-water': 36,
              'wooden-commercial-workshop-water-access': 48,
              'workshop-map-context': 8,
          }
          PY

      - name: Download and extract P13 full-duration correction
        run: |
          rm -rf /tmp/sakai-correction-video-p13 /tmp/sakai-correction-evidence-p13
          mkdir -p /tmp/sakai-correction-video-p13 /tmp/sakai-correction-evidence-p13
          python tools/download_authorized_bilibili_page_by_cid.py \
            --job data/analysis-jobs/eleven-p013.json \
            --output-dir /tmp/sakai-correction-video-p13 \
            --quality 32
          python tools/extract_geospatial_2p5d_sakai_correction_evidence.py \
            --video /tmp/sakai-correction-video-p13/eleven-p013-v2.mp4 \
            --scan-id p13-full-duration-correction \
            --output-dir /tmp/sakai-correction-evidence-p13 \
            --run-id '${{ github.run_id }}'

      - name: Validate P13 artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/sakai-correction-evidence-p13')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          assert manifest['status'] == 'correction-artifact-ready'
          assert manifest['scanId'] == 'p13-full-duration-correction'
          assert len(manifest['extraction']['frames']) == 96
          assert len(manifest['extraction']['contactSheets']) == 6
          assert all((root / row['filename']).is_file() for row in manifest['extraction']['frames'])
          assert all((root / row['filename']).is_file() for row in manifest['extraction']['contactSheets'])
          PY

      - name: Upload one-day P13 artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-sakai-2p5d-p13-full-duration-correction-${{ github.run_id }}
          path: /tmp/sakai-correction-evidence-p13
          retention-days: 1
          compression-level: 6
          if-no-files-found: error

      - name: Delete P13 video and pixels
        run: |
          rm -rf /tmp/sakai-correction-video-p13 /tmp/sakai-correction-evidence-p13
          test ! -e /tmp/sakai-correction-video-p13
          test ! -e /tmp/sakai-correction-evidence-p13

      - name: Download and extract P15 dense candidate windows
        run: |
          rm -rf /tmp/sakai-correction-video-p15 /tmp/sakai-correction-evidence-p15
          mkdir -p /tmp/sakai-correction-video-p15 /tmp/sakai-correction-evidence-p15
          python tools/download_authorized_bilibili_page_by_cid.py \
            --job data/analysis-jobs/eleven-p015.json \
            --output-dir /tmp/sakai-correction-video-p15 \
            --quality 32
          python tools/extract_geospatial_2p5d_sakai_correction_evidence.py \
            --video /tmp/sakai-correction-video-p15/eleven-p015-v2.mp4 \
            --scan-id p15-urban-dense-candidate \
            --output-dir /tmp/sakai-correction-evidence-p15 \
            --run-id '${{ github.run_id }}'

      - name: Validate P15 artifact
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('/tmp/sakai-correction-evidence-p15')
          manifest = json.loads((root / 'manifest.json').read_text(encoding='utf-8'))
          assert manifest['status'] == 'correction-artifact-ready'
          assert manifest['scanId'] == 'p15-urban-dense-candidate'
          assert len(manifest['extraction']['frames']) == 192
          assert len(manifest['extraction']['contactSheets']) == 12
          assert all((root / row['filename']).is_file() for row in manifest['extraction']['frames'])
          assert all((root / row['filename']).is_file() for row in manifest['extraction']['contactSheets'])
          PY

      - name: Upload one-day P15 artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-sakai-2p5d-p15-urban-dense-candidate-${{ github.run_id }}
          path: /tmp/sakai-correction-evidence-p15
          retention-days: 1
          compression-level: 6
          if-no-files-found: error

      - name: Delete P15 video and pixels
        run: |
          rm -rf /tmp/sakai-correction-video-p15 /tmp/sakai-correction-evidence-p15
          test ! -e /tmp/sakai-correction-video-p15
          test ! -e /tmp/sakai-correction-evidence-p15

      - name: Write and validate non-pixel manifests
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          plan = json.loads(Path('data/geospatial/geospatial-2p5d-sakai-correction-scan-plan.json').read_text(encoding='utf-8'))
          timestamps = json.loads(Path(plan['outputs']['timestampPlan']).read_text(encoding='utf-8'))
          run_id = os.environ['GITHUB_RUN_ID']
          payload = {
              'schemaVersion': 1,
              'generatedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'status': 'correction-artifacts-uploaded-awaiting-visual-review',
              'stage': plan['stage'],
              'runId': run_id,
              'authorizationId': plan['authorizationId'],
              'timestampPlanPath': plan['outputs']['timestampPlan'],
              'counts': {'jobs': 2, 'frames': 288, 'contactSheets': 18, 'artifacts': 2},
              'artifacts': [
                  {
                      'scanId': row['id'],
                      'sourceJobId': row['sourceJobId'],
                      'name': f"atlas-sakai-2p5d-{row['id']}-{run_id}",
                      'frameCount': row['frameCount'],
                      'contactSheetCount': row['contactSheetCount'],
                      'retentionDays': 1,
                      'containsOriginalVideo': False,
                      'containsLowResolutionReviewFrames': True,
                  }
                  for row in timestamps['jobs']
              ],
              'privacy': {
                  'repositoryContainsPixels': False,
                  'artifactContainsTransientPixels': True,
                  'originalVideoRetained': False,
                  'geometryGenerated': False,
              },
              'nextAction': 'review the P13 full-duration and P15 dense artifacts and record landmark correspondences',
          }
          manifest_path = Path(plan['outputs']['artifactManifest'])
          manifest_path.parent.mkdir(parents=True, exist_ok=True)
          manifest_path.write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          outcome = {
              'schemaVersion': 1,
              'status': 'success',
              'runId': run_id,
              'stage': plan['stage'],
              'timestampPlan': plan['outputs']['timestampPlan'],
              'artifactManifest': plan['outputs']['artifactManifest'],
              'recordedAt': payload['generatedAt'],
          }
          outcome_path = Path(plan['outputs']['workflowOutcome'])
          outcome_path.parent.mkdir(parents=True, exist_ok=True)
          outcome_path.write_text(json.dumps(outcome, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          assert payload['counts'] == {'jobs': 2, 'frames': 288, 'contactSheets': 18, 'artifacts': 2}
          assert payload['privacy']['repositoryContainsPixels'] is False
          assert not list(Path('data').rglob('*.jpg'))
          assert not list(Path('data').rglob('*.png'))
          assert not list(Path('data').rglob('*.mp4'))
          PY

      - name: Publish non-pixel outputs atomically
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          rm -rf /tmp/sakai-correction-finalize
          mkdir -p /tmp/sakai-correction-finalize/data/geospatial /tmp/sakai-correction-finalize/data/batch-analysis
          cp data/geospatial/geospatial-2p5d-sakai-correction-timestamp-plan.json /tmp/sakai-correction-finalize/data/geospatial/
          cp data/geospatial/geospatial-2p5d-sakai-correction-artifact-manifest.json /tmp/sakai-correction-finalize/data/geospatial/
          cp data/batch-analysis/geospatial-2p5d-sakai-correction-scan-workflow.json /tmp/sakai-correction-finalize/data/batch-analysis/
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4 5 6; do
            git fetch origin "$TARGET_BRANCH"
            git reset --hard "origin/$TARGET_BRANCH"
            mkdir -p data/geospatial data/batch-analysis
            cp /tmp/sakai-correction-finalize/data/geospatial/*.json data/geospatial/
            cp /tmp/sakai-correction-finalize/data/batch-analysis/*.json data/batch-analysis/
            git add \
              data/geospatial/geospatial-2p5d-sakai-correction-timestamp-plan.json \
              data/geospatial/geospatial-2p5d-sakai-correction-artifact-manifest.json \
              data/batch-analysis/geospatial-2p5d-sakai-correction-scan-workflow.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Record Sakai 2.5D correction scan package [skip ci]'
            if git push origin "HEAD:$TARGET_BRANCH"; then exit 0; fi
            sleep $((attempt * 4))
          done
          exit 1

      - name: Delete final staging
        if: always()
        run: |
          rm -rf /tmp/sakai-correction-finalize /tmp/sakai-correction-video-p13 /tmp/sakai-correction-evidence-p13 /tmp/sakai-correction-video-p15 /tmp/sakai-correction-evidence-p15
          test ! -e /tmp/sakai-correction-finalize
