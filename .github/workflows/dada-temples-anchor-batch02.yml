name: Build Dada temple anchor batch 02

on:
  push:
    branches: [main]
    paths:
      - 'tools/build_dada_temple_anchor_batch02.py'
      - '.github/workflows/dada-temples-anchor-batch02.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dada-temples-anchor-batch02
  cancel-in-progress: true

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile anchor builder
        id: compile
        run: python -m py_compile tools/build_dada_temple_anchor_batch02.py

      - name: Build reviewed anchor batch
        id: build
        run: python tools/build_dada_temple_anchor_batch02.py

      - name: Run 400-round anchor integrity gate
        id: gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for _ in range(400):
              anchors = json.loads(Path('data/geospatial/dada-temples-36-anchors-batch02.json').read_text(encoding='utf-8'))
              status = json.loads(Path('data/batch-analysis/dada-temples-36-anchor-batch02-status.json').read_text(encoding='utf-8'))
              rows = anchors['anchors']
              assert anchors['status'] == 'complete'
              assert anchors['source']['bvid'] == 'BV19EXYYWEdv'
              assert [row['videoPosition'] for row in rows] == list(range(13, 25))
              assert len(rows) == 12
              assert all(row['status'] == 'confirmed' for row in rows)
              assert len({row['locationId'] for row in rows}) == 12
              assert all(row['confidence'] >= .9 for row in rows)
              assert all('atlas' in row and set(row['atlas']) == {'x', 'y'} for row in rows)
              assert all(row['evidence'] and all(e['sha256'] for e in row['evidence']) for row in rows)
              assert anchors['counts'] == {'reviewed': 12, 'confirmed': 12, 'unresolved': 0, 'coordinatesWritten': 12}
              assert anchors['policy']['repositoryContainsFramePixels'] is False
              assert status['status'] == 'complete'
              assert all(status['checks'].values())
              assert status['counts'] == anchors['counts']
          PY

      - name: Persist second reviewed anchor batch
        id: persist
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/geospatial/dada-temples-36-anchors-batch02.json
          git add data/batch-analysis/dada-temples-36-anchor-batch02-status.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Build second reviewed Dada temple anchor batch [skip ci]'
          for attempt in 1 2 3 4; do
            if git pull --rebase origin main && git push origin HEAD:main; then exit 0; fi
            git rebase --abort || true
            sleep $((attempt * 3))
          done
          exit 1

      - name: Record anchor batch workflow outcome
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          GATE_OUTCOME: ${{ steps.gate.outcome }}
          PERSIST_OUTCOME: ${{ steps.persist.outcome }}
        run: |
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          steps = {
              'compile': os.environ.get('COMPILE_OUTCOME') or 'not-run',
              'build': os.environ.get('BUILD_OUTCOME') or 'not-run',
              'gate': os.environ.get('GATE_OUTCOME') or 'not-run',
              'persist': os.environ.get('PERSIST_OUTCOME') or 'not-run',
          }
          failed = next((name for name, value in steps.items() if value in {'failure', 'cancelled'}), None)
          payload = {
              'schemaVersion': 1,
              'status': os.environ.get('JOB_STATUS') or 'unknown',
              'failedStage': failed,
              'steps': steps,
              'runId': os.environ.get('GITHUB_RUN_ID'),
              'triggerSha': os.environ.get('GITHUB_SHA'),
              'recordedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
          }
          Path('/tmp/dada-temples-anchor-batch02-workflow.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p data/batch-analysis
            cp /tmp/dada-temples-anchor-batch02-workflow.json data/batch-analysis/dada-temples-36-anchor-batch02-workflow.json
            git add data/batch-analysis/dada-temples-36-anchor-batch02-workflow.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Record Dada temple anchor batch 02 outcome [skip ci]'
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
