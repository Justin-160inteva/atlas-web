name: Repair and reprocess Dada sequence 20

on:
  push:
    branches: [main]
    paths:
      - 'tools/resolve_dada_sequence20.py'
      - 'tools/verify_dada_sequence20.py'
      - '.github/workflows/dada-sequence-20-resolution.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dada-sequence-20-end-to-end
  cancel-in-progress: false

jobs:
  repair-and-reprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out requested revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile repair pipeline
        run: |
          python -m py_compile tools/resolve_dada_sequence06.py tools/resolve_dada_sequence20.py
          python -m py_compile tools/reprocess_verified_dada_item.py tools/reprocess_verified_dada_item_v2.py
          python -m py_compile tools/verify_dada_sequence20.py

      - name: Repair and stage sequence 20 identity
        run: python tools/resolve_dada_sequence20.py --apply --require-resolved

      - name: Run 400-round identity gate
        run: python tools/verify_dada_sequence20.py preflight --rounds 400

      - name: Run 400-round reprocess preflight
        run: python tools/reprocess_verified_dada_item_v2.py data/reprocess/dada-seq20.json --validate-only --self-check-rounds 400

      - name: Install transient analysis dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'yt-dlp[default,curl-cffi]' opencv-python-headless numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download and analyze verified sequence 20
        env:
          PYTHONUNBUFFERED: '1'
        run: python tools/reprocess_verified_dada_item_v2.py data/reprocess/dada-seq20.json --self-check-rounds 400

      - name: Remove transient media
        if: always()
        run: |
          find /tmp -maxdepth 1 -type d -name 'atlas-authorized-*' -exec rm -rf {} + || true
          find . -type f \( -name '*.mp4' -o -name '*.m4a' -o -name '*.webm' -o -name '*.flv' \) -delete

      - name: Rebuild final Dada quality queue
        run: python tools/audit_dada_catalog.py

      - name: Run 400-round transition gate
        run: python tools/reprocess_verified_dada_item_v2.py data/reprocess/dada-seq20.json --verify-transition --self-check-rounds 400

      - name: Run 400-round final identity gate
        run: python tools/verify_dada_sequence20.py final --rounds 400

      - name: Upload sequence 20 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dada-sequence-20-end-to-end-${{ github.sha }}
          path: |
            data/reprocess/dada-seq20.json
            data/batch-analysis/dada-sequence-20-resolution.json
            data/analysis-results/dada-20.json
            data/batch-analysis/dada-seq20-reprocess-status.json
            data/dada-ac-shadows-catalog.json
            data/batch-analysis/dada-author-catalog-status.json
            data/batch-analysis/dada-catalog-quality-audit.json
            data/analysis-jobs/dada-quality-reprocess.json
          if-no-files-found: warn

      - name: Persist repaired sequence 20 replacement
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/reprocess/dada-seq20.json
          git add data/batch-analysis/dada-sequence-20-resolution.json data/batch-analysis/dada-seq20-reprocess-status.json
          git add data/analysis-jobs/dada-20.json data/analysis-results/dada-20.json data/analysis-index.json
          git add data/dada-ac-shadows-catalog.json data/batch-analysis/dada-author-catalog-status.json
          git add data/batch-analysis/dada-catalog-quality-audit.json data/analysis-jobs/dada-quality-reprocess.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Repair and reprocess Dada sequence 20 [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
