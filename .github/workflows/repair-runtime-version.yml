name: Repair runtime version and cache

on:
  push:
    paths:
      - 'data/maintenance/repair-runtime-version.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Repair hard-coded runtime versions and cache strategy
        run: python tools/repair_runtime_version.py
      - name: Validate repaired runtime
        run: |
          grep -q '0.9.3.6' index.html
          grep -q 'atlas-analysis-import.js?v=0.9.3.6' index.html
          grep -q 'ALPHA 0.9.3.6' index.html
          grep -q "atlas-alpha-0936-pages-v1" sw.js
          grep -q "request.mode==='navigate'" sw.js
          grep -q "cache:'no-store'" sw.js
          node --check atlas-analysis-import.js
          node --check atlas-liquid-nav-0934.js
          node --check sw.js
      - name: Commit repaired files
        run: |
          git config user.name 'atlas-automation'
          git config user.email 'actions@users.noreply.github.com'
          git add index.html atlas-analysis-import.js atlas-liquid-nav-0934.js sw.js
          if git diff --cached --quiet; then
            echo 'No runtime repair changes needed.'
          else
            git commit -m 'Repair runtime cache lock and publish Alpha 0.9.3.6'
            git push
          fi
