name: Diagnose Dada final integrity

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-dada-final-integrity.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate non-mutating integrity report
        run: python tools/finalize_dada_catalog.py
      - name: Persist diagnostic report
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/batch-analysis/dada-final-integrity.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m 'Record Dada final integrity diagnostics [skip ci]'
          git pull --rebase origin main
          git push origin HEAD:main
