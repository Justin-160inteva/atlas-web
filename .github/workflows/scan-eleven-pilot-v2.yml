name: Scan 11 game world regional batch v5

on:
  push:
    paths:
      - 'data/batch-analysis/eleven-pilot-v2-trigger.json'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: scan-eleven-regional-batch
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install analysis dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'yt-dlp[default,curl-cffi]' opencv-python-headless numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl

      - name: Compile scan, telemetry, audit, and recovery tools
        run: |
          python -m py_compile tools/publish_runtime_progress.py
          python -m py_compile tools/analyze_authorized_video.py
          python -m py_compile tools/analyze_authorized_video_v2.py
          python -m py_compile tools/analyze_authorized_video_v5.py
          python -m py_compile tools/analyze_authorized_video_v6.py
          python -m py_compile tools/analyze_authorized_video_v9.py
          python -m py_compile tools/analyze_authorized_video_v10.py
          python -m py_compile tools/scan_catalog_queue_v2.py
          python -m py_compile tools/diagnose_and_recover_scan_v2.py
          python -m py_compile tools/run_scan_with_auto_recovery.py
          python -m py_compile tools/update_analysis_index.py

      - name: Verify authorization, regional queue, bug dictionary, and minute telemetry
        run: |
          python - <<'PY'
          import json
          auth=json.load(open('data/authorizations.json',encoding='utf-8'))
          queue=json.load(open('data/batch-analysis/eleven-pilot-scan-queue.json',encoding='utf-8'))
          catalog=json.load(open('data/eleven-game-world-ac-shadows-catalog.json',encoding='utf-8'))
          manifest=json.load(open('data/batch-analysis/eleven-pilot-scan-manifest.json',encoding='utf-8'))
          bugs=json.load(open('data/scan-bug-dictionary.json',encoding='utf-8'))
          record=next(item for item in auth['records'] if item['id']==queue['authorizationId'])
          scope=record['scope']
          region=queue['pilotRegion']
          assert record['status']=='active' and record['author']=='11的游戏世界'
          assert 1<=len(queue['items'])<=3 and manifest['maxItemsPerRun']==1
          assert all(item['regionGuess']==region for item in queue['items'])
          catalog_ids={entry['id'] for entry in catalog['items']}
          assert all(item['externalSourceId'] in catalog_ids for item in queue['items'])
          assert scope['localDownloadAndAnalysis'] and scope['computerVisionAnalysis']
          assert scope['privateLowResolutionKeyframes']
          assert scope['nonCommercial'] and scope['commercialUseRequiresSeparateWrittenConsent']
          assert manifest['analyzer'].endswith('analyze_authorized_video_v10.py')
          assert manifest['compatibilityFixes']['curlCffiResponseContextManager'] is True
          assert manifest['runtimeHeartbeat']['minimumIntervalSeconds']==60
          assert manifest['runtimeHeartbeat']['independentTicker']
          assert manifest['runtimeHeartbeat']['continuesDuringNetworkStall']
          assert manifest['downloadTelemetry']['intervalSeconds']==60
          assert len(bugs['entries'])>=18
          assert len({entry['id'] for entry in bugs['entries']})==len(bugs['entries'])
          assert all(entry['patterns'] for entry in bugs['entries'])
          print(f'authorization, {region} queue, bug dictionary, and minute telemetry passed')
          PY

      - name: Scan one item with immediate bounded auto-recovery
        id: scan
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          ATLAS_PROGRESS_TOKEN: ${{ github.token }}
          ATLAS_PROGRESS_REPOSITORY: ${{ github.repository }}
          ATLAS_PROGRESS_BRANCH: main
          ATLAS_PROGRESS_PATH: data/runtime-progress/eleven-pilot-progress.json
          ATLAS_PROGRESS_LOCAL_PATH: /tmp/atlas-runtime-progress.json
          ATLAS_PROGRESS_MIN_INTERVAL_SECONDS: '60'
          ATLAS_PROGRESS_CONFLICT_RETRIES: '5'
        run: python tools/run_scan_with_auto_recovery.py data/batch-analysis/eleven-pilot-scan-manifest.json

      - name: Remove all transient media
        if: always()
        run: |
          find /tmp -maxdepth 1 -type d -name 'atlas-authorized-*' -exec rm -rf {} + || true
          find . -type f \( -name '*.mp4' -o -name '*.m4a' -o -name '*.webm' -o -name '*.flv' \) -delete

      - name: Read recovery and orchestration decision
        if: always()
        id: recovery
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, pathlib
          recovery_path=pathlib.Path('data/batch-analysis/eleven-pilot-recovery-report.json')
          orchestration_path=pathlib.Path('data/batch-analysis/eleven-pilot-orchestration-report.json')
          recovery=json.load(recovery_path.open(encoding='utf-8')) if recovery_path.exists() else {}
          orchestration=json.load(orchestration_path.open(encoding='utf-8')) if orchestration_path.exists() else {}
          human=recovery.get('requiresHumanReview',False) or orchestration.get('finalState') in {'human_review_required','unrecoverable','attempt_limit_reached'}
          print(f"retry={'true' if recovery.get('retryScheduled') else 'false'}")
          print(f"human={'true' if human else 'false'}")
          print(f"category={recovery.get('category','none')}")
          print(f"action={recovery.get('action','none')}")
          print(f"final={orchestration.get('finalState','unknown')}")
          PY

      - name: Run 400-round integrity and privacy gate
        if: always()
        run: |
          python - <<'PY'
          import json, pathlib
          queue=json.load(open('data/batch-analysis/eleven-pilot-scan-queue.json',encoding='utf-8'))
          status=json.load(open('data/batch-analysis/eleven-pilot-scan-status.json',encoding='utf-8'))
          catalog=json.load(open('data/eleven-game-world-ac-shadows-catalog.json',encoding='utf-8'))
          manifest=json.load(open('data/batch-analysis/eleven-pilot-scan-manifest.json',encoding='utf-8'))
          bugs=json.load(open('data/scan-bug-dictionary.json',encoding='utf-8'))
          index=json.load(open('data/analysis-index.json',encoding='utf-8'))
          indexed={item['externalSourceId']:item for item in index['items']}
          allowed={'pending','running','failed','imported'}
          for _ in range(400):
              assert status['authorizationId']==queue['authorizationId']==catalog['authorizationId']
              assert status['summary']['total']==len(queue['items'])
              assert 1<=len(queue['items'])<=3
              assert all(item['regionGuess']==queue['pilotRegion'] for item in queue['items'])
              assert all(item.get('state','pending') in allowed for item in queue['items'])
              assert manifest['analyzer'].endswith('analyze_authorized_video_v10.py')
              assert manifest['runtimeHeartbeat']['minimumIntervalSeconds']==60
              assert manifest['retention']['originalVideo'] is False
              assert manifest['retention']['framePixels'] is False
              assert bugs['defaultPolicy']['neverBroadenAuthorization'] is True
              assert bugs['defaultPolicy']['neverRetainOriginalMedia'] is True
              for item in queue['items']:
                  if item.get('state')=='imported':
                      entry=indexed[item['externalSourceId']]
                      assert entry['status']=='imported'
                      assert entry['media']['videoRetained'] is False
                      assert entry['media']['framePixelsRetained'] is False
              assert not list(pathlib.Path('.').rglob('*.mp4'))
              assert not list(pathlib.Path('.').rglob('*.m4a'))
              assert not list(pathlib.Path('.').rglob('*.webm'))
              assert not list(pathlib.Path('.').rglob('*.flv'))
          print('400/400 integrity and privacy checks passed')
          PY

      - name: Read durable regional state
        if: always()
        id: state
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          status=json.load(open('data/batch-analysis/eleven-pilot-scan-status.json',encoding='utf-8'))
          queue=json.load(open('data/batch-analysis/eleven-pilot-scan-queue.json',encoding='utf-8'))
          summary=status['summary']
          print(f"complete={'true' if status['complete'] else 'false'}")
          print(f"progress={summary.get('newlyImportedThisRun',0)}")
          print(f"imported={summary['imported']}")
          print(f"total={summary['total']}")
          print(f"region={queue['pilotRegion']}")
          print(f"phase={status.get('phase','unknown')}")
          PY

      - name: Persist scan, diagnosis, and recovery state
        if: always()
        run: |
          TRACKED='data/analysis-results data/analysis-jobs data/analysis-index.json data/eleven-game-world-ac-shadows-catalog.json data/batch-analysis/eleven-pilot-scan-queue.json data/batch-analysis/eleven-pilot-scan-status.json data/batch-analysis/eleven-pilot-recovery-report.json data/batch-analysis/eleven-pilot-orchestration-report.json data/batch-analysis/eleven-pilot-scan-manifest.json'
          if [ -z "$(git status --porcelain -- $TRACKED)" ]; then
            echo 'No durable regional changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add $TRACKED
          git commit -m "Scan/recover ${{ steps.state.outputs.region }} batch: ${{ steps.state.outputs.imported }}/${{ steps.state.outputs.total }} (${{ steps.recovery.outputs.action }})"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then exit 0; fi
            git rebase --abort || true
            sleep $((attempt * 4))
          done
          exit 1

      - name: Continue after one successful item
        if: always() && steps.state.outputs.complete != 'true' && steps.recovery.outputs.human != 'true' && steps.state.outputs.progress != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run scan-eleven-pilot-v2.yml --ref main

      - name: Stop visibly when human review is required
        if: always() && steps.recovery.outputs.human == 'true'
        run: |
          echo "Automatic recovery stopped: ${{ steps.recovery.outputs.category }} / ${{ steps.recovery.outputs.action }}"
          exit 1
