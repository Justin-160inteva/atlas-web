name: Dada Shrine Anchor Batch 01

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dada-shrines-anchor-batch01.yml'
      - 'tools/build_dada_shrines_geospatial_stage1.py'
      - 'tools/extract_dada_shrine_anchor_batch.py'
      - 'tools/review_dada_shrine_anchor_batch_bulk.py'
      - 'tools/build_geospatial_progress.py'
      - 'data/geospatial/geospatial-vision-policy.json'
      - 'data/geospatial/dada-shrines-anchor-batch01-trigger.json'
  pull_request:
    paths:
      - '.github/workflows/dada-shrines-anchor-batch01.yml'
      - 'tools/build_dada_shrines_geospatial_stage1.py'
      - 'tools/extract_dada_shrine_anchor_batch.py'
      - 'tools/review_dada_shrine_anchor_batch_bulk.py'
      - 'tools/build_geospatial_progress.py'
      - 'data/geospatial/geospatial-vision-policy.json'
      - 'data/geospatial/dada-shrines-anchor-batch01-trigger.json'

permissions:
  contents: write
  models: read

concurrency:
  group: dada-shrines-anchor-batch01-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extract-review-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile geospatial tools
        run: |
          python -m py_compile \
            tools/build_dada_shrines_geospatial_stage1.py \
            tools/extract_dada_shrine_anchor_batch.py \
            tools/review_dada_shrine_anchor_batch_bulk.py \
            tools/build_geospatial_progress.py \
            tools/analyze_authorized_video_v2.py \
            tools/analyze_authorized_video_v4.py

      - name: Install transient media dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'yt-dlp[default,curl-cffi]' opencv-python-headless numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Build current shrine candidate scaffold
        run: python tools/build_dada_shrines_geospatial_stage1.py

      - name: Download authorized shrine sequence transiently
        id: download
        run: |
          rm -rf /tmp/dada-shrines-batch01-video /tmp/dada-shrines-batch01-evidence
          mkdir -p /tmp/dada-shrines-batch01-video /tmp/dada-shrines-batch01-evidence
          PYTHONPATH=tools python - <<'PY'
          import json
          import os
          from pathlib import Path
          import analyze_authorized_video_v4 as resilient

          workdir = Path('/tmp/dada-shrines-batch01-video')
          url = 'https://www.bilibili.com/video/BV1aFXaYmEDZ/'
          video_path, attempts = resilient.runner.download_with_fallbacks(url, workdir)
          (workdir / 'download-attempts.json').write_text(
              json.dumps(attempts, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          if not video_path.is_file() or video_path.stat().st_size < 1024:
              raise RuntimeError('resilient downloader produced no usable shrine video')
          strategy = next(row['strategy'] for row in attempts if row.get('success'))
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'video_path={video_path.resolve()}\n')
              handle.write(f'download_strategy={strategy}\n')
          print(json.dumps({'videoPath': str(video_path), 'bytes': video_path.stat().st_size, 'strategy': strategy}, ensure_ascii=False))
          PY

      - name: Extract slots 1-14 transiently
        env:
          VIDEO_PATH: ${{ steps.download.outputs.video_path }}
        run: |
          python tools/extract_dada_shrine_anchor_batch.py \
            --video "$VIDEO_PATH" \
            --output-dir /tmp/dada-shrines-batch01-evidence \
            --run-id '${{ github.run_id }}' \
            --artifact-name 'dada-shrines-batch01-${{ github.run_id }}' \
            --start-slot 1 \
            --end-slot 14

      - name: Bulk-review direct evidence with two models
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python tools/review_dada_shrine_anchor_batch_bulk.py \
            --evidence-dir /tmp/dada-shrines-batch01-evidence \
            --manifest data/geospatial/dada-shrines-27-batch01-evidence-manifest.json \
            --output data/geospatial/dada-shrines-27-anchors-batch01.json

      - name: Reconcile global geospatial progress
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          anchors = json.loads(Path('data/geospatial/dada-shrines-27-anchors-batch01.json').read_text(encoding='utf-8'))
          job_path = Path('data/analysis-jobs/dada-shrines-27-geospatial.json')
          job = json.loads(job_path.read_text(encoding='utf-8'))
          job['status'] = 'batch01-complete' if anchors['counts']['confirmed'] else 'batch01-complete-no-confirmed-anchors'
          job['linkedSlotCount'] = anchors['counts']['confirmed']
          job['unlinkedSlotCount'] = 27 - anchors['counts']['confirmed']
          job['batch01Path'] = 'data/geospatial/dada-shrines-27-anchors-batch01.json'
          job['nextAction'] = 'review unresolved batch01 slots and continue slots 15-27'
          job['updatedAt'] = datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z')
          job_path.write_text(json.dumps(job, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
          python tools/build_geospatial_progress.py

      - name: Validate anchor and privacy gates
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path('data/geospatial/dada-shrines-27-batch01-evidence-manifest.json').read_text(encoding='utf-8'))
          anchors = json.loads(Path('data/geospatial/dada-shrines-27-anchors-batch01.json').read_text(encoding='utf-8'))
          progress = json.loads(Path('data/geospatial/geospatial-progress.json').read_text(encoding='utf-8'))
          assert manifest['batch'] == {'startSlot': 1, 'endSlot': 14, 'targetSlots': 14}
          assert manifest['extraction']['frameCount'] == 42
          assert manifest['extraction']['contactSheetCount'] == 5
          assert manifest['privacy']['repositoryContainsPixels'] is False
          assert anchors['counts']['reviewedSlots'] == 14
          assert anchors['counts']['confirmed'] + anchors['counts']['unresolved'] == 14
          assert anchors['counts']['successfulModels'] == 2
          assert anchors['counts']['failedModels'] == 0
          assert anchors['policy']['modelRequestCount'] == 2
          assert len({row['locationId'] for row in anchors['anchors']}) == anchors['counts']['confirmed']
          assert all(row['confidence'] >= .92 for row in anchors['anchors'])
          assert all(row['resolutionMethod'] == 'two-model-bulk-direct-visual-consensus' for row in anchors['anchors'])
          assert anchors['privacy']['repositoryContainsPixels'] is False
          assert progress['phase1']['confirmedAnchors'] == 36 + anchors['counts']['confirmed']
          assert progress['phase1']['confirmedAnchors'] <= 50
          assert all(progress['safety'].values())
          assert not list(Path('data').rglob('*.jpg'))
          assert not list(Path('data').rglob('*.png'))
          assert not list(Path('data').rglob('*.mp4'))
          print(
              f"Shrine batch 01: {anchors['counts']['confirmed']}/14 confirmed; "
              f"phase 1 now {progress['phase1']['confirmedAnchors']}/50."
          )
          PY

      - name: Commit non-pixel shrine anchor results
        env:
          TARGET_BRANCH: ${{ github.event_name == 'pull_request' && github.head_ref || 'main' }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            data/analysis-index.json \
            data/analysis-jobs/dada-temples-36-geospatial.json \
            data/analysis-jobs/dada-shrines-27-geospatial.json \
            data/geospatial/dada-shrines-27-stage1.json \
            data/geospatial/dada-shrines-27-batch01-evidence-manifest.json \
            data/geospatial/dada-shrines-27-anchors-batch01.json \
            data/geospatial/geospatial-progress.json \
            data/batch-analysis/dada-shrines-27-geospatial-status.json
          if git diff --cached --quiet; then
            echo 'No non-pixel shrine anchor changes.'
            exit 0
          fi
          git commit -m 'Review shrine anchor batch 01 and update geospatial progress [skip ci]'
          for attempt in 1 2 3 4 5 6; do
            if git pull --rebase origin "$TARGET_BRANCH" && git push origin "HEAD:$TARGET_BRANCH"; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done
          exit 1

      - name: Delete all transient video and frame pixels
        if: always()
        run: |
          rm -rf /tmp/dada-shrines-batch01-video /tmp/dada-shrines-batch01-evidence
          test ! -e /tmp/dada-shrines-batch01-video
          test ! -e /tmp/dada-shrines-batch01-evidence
          find . -type f \( -name '*.mp4' -o -name '*.webm' -o -name '*.flv' -o -name '*.jpg' \) -not -path './assets/*' -delete
