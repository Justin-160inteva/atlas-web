name: Watch 11 game world regional pilot

on:
  push:
    paths:
      - 'data/batch-analysis/eleven-pilot-watchdog.json'
  workflow_dispatch:
  schedule:
    - cron: '17,47 * * * *'

permissions:
  contents: write
  actions: write

concurrency:
  group: watch-eleven-regional-pilot
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile watchdog
        run: python -m py_compile tools/watch_and_resume_scan.py

      - name: Verify bounded watchdog policy
        run: |
          python - <<'PY'
          import json
          config=json.load(open('data/batch-analysis/eleven-pilot-watchdog.json',encoding='utf-8'))
          manifest=json.load(open(config['manifest'],encoding='utf-8'))
          policy=config['policy']
          assert manifest['maxItemsPerRun']==1
          assert policy['oneItemPerRun']
          assert policy['maximumAttemptsPerItem']==3
          assert policy['neverModifySourceCodeAutomatically']
          assert policy['neverBroadenAuthorization']
          assert policy['neverRetainOriginalMedia']
          assert policy['neverExpandQueueScope']
          assert manifest['retention']['originalVideo'] is False
          assert manifest['retention']['framePixels'] is False
          print('bounded watchdog policy passed')
          PY

      - name: Inspect queue and make a safe resume decision
        id: watchdog
        run: |
          python tools/watch_and_resume_scan.py data/batch-analysis/eleven-pilot-watchdog.json
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          report=json.load(open('data/batch-analysis/eleven-pilot-watchdog-state.json',encoding='utf-8'))
          print(f"resume={'true' if report['resumeWorkflow'] else 'false'}")
          print(f"decision={report['decision']}")
          PY

      - name: Run 400-round watchdog integrity gate
        run: |
          python - <<'PY'
          import json, pathlib
          report=json.load(open('data/batch-analysis/eleven-pilot-watchdog-state.json',encoding='utf-8'))
          queue=json.load(open('data/batch-analysis/eleven-pilot-scan-queue.json',encoding='utf-8'))
          manifest=json.load(open('data/batch-analysis/eleven-pilot-scan-manifest.json',encoding='utf-8'))
          allowed={'pending','running','failed','imported'}
          for _ in range(400):
              assert len(queue['items'])==3
              assert all(item.get('state','pending') in allowed for item in queue['items'])
              assert report['safety']['sourceCodeModified'] is False
              assert report['safety']['authorizationBroadened'] is False
              assert report['safety']['mediaRetentionChanged'] is False
              assert report['safety']['queueScopeExpanded'] is False
              assert manifest['retention']['originalVideo'] is False
              assert manifest['retention']['framePixels'] is False
              assert not list(pathlib.Path('.').rglob('*.mp4'))
              assert not list(pathlib.Path('.').rglob('*.m4a'))
              assert not list(pathlib.Path('.').rglob('*.webm'))
              assert not list(pathlib.Path('.').rglob('*.flv'))
          print('400/400 watchdog checks passed')
          PY

      - name: Persist watchdog decision
        run: |
          if [ -z "$(git status --porcelain -- data/batch-analysis/eleven-pilot-scan-queue.json data/batch-analysis/eleven-pilot-watchdog-state.json)" ]; then
            echo 'No watchdog changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/batch-analysis/eleven-pilot-scan-queue.json data/batch-analysis/eleven-pilot-watchdog-state.json
          git commit -m "Watch 11 game world 山城 pilot: ${{ steps.watchdog.outputs.decision }}"
          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            sleep $((attempt * 4))
          done
          exit 1

      - name: Resume only stale or retryable work
        if: steps.watchdog.outputs.resume == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run scan-eleven-pilot-v2.yml --ref main
