name: Observe Dada sequence 20 workflow

on:
  workflow_run:
    workflows:
      - Repair and reprocess Dada sequence 20
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  record-outcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Record completed run
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_EVENT: ${{ github.event.workflow_run.event }}
          RUN_STATUS: ${{ github.event.workflow_run.status }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs?per_page=100" > /tmp/jobs.json
          python - <<'PY'
          import json, os
          from datetime import datetime, timezone
          from pathlib import Path
          raw = json.loads(Path('/tmp/jobs.json').read_text(encoding='utf-8'))
          jobs = []
          failed = None
          for job in raw.get('jobs', []):
              steps = []
              for step in job.get('steps', []):
                  row = {key: step.get(key) for key in ('number', 'name', 'status', 'conclusion')}
                  steps.append(row)
                  if failed is None and step.get('conclusion') in {'failure', 'cancelled'}:
                      failed = step.get('name')
              jobs.append({'id': job.get('id'), 'name': job.get('name'), 'conclusion': job.get('conclusion'), 'steps': steps})
          payload = {
              'schemaVersion': 1,
              'sequence': 20,
              'runId': int(os.environ['RUN_ID']),
              'runNumber': int(os.environ['RUN_NUMBER']),
              'runAttempt': int(os.environ.get('RUN_ATTEMPT') or 1),
              'headSha': os.environ.get('HEAD_SHA'),
              'event': os.environ.get('RUN_EVENT'),
              'status': os.environ.get('RUN_STATUS'),
              'conclusion': os.environ.get('RUN_CONCLUSION'),
              'failedStage': failed,
              'runUrl': os.environ.get('RUN_URL'),
              'recordedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
              'jobs': jobs,
          }
          Path('/tmp/dada-seq20-workflow-run.json').write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Persist run observation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          for attempt in 1 2 3 4; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p data/batch-analysis
            cp /tmp/dada-seq20-workflow-run.json data/batch-analysis/dada-seq20-workflow-run.json
            git add data/batch-analysis/dada-seq20-workflow-run.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m 'Record Dada sequence 20 completed run [skip ci]'
            if git push origin HEAD:main; then exit 0; fi
            sleep $((attempt * 3))
          done
          exit 1
